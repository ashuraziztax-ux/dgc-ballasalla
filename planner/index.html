<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="utf-8">

<style>
:root {
  --bg: #f1f5f9;
  --surface: #ffffff;
  --surface2: #f8fafc;
  --border: #e2e8f0;
  --accent: #f59e0b;
  --accent2: #3b82f6;
  --green: #22c55e;
  --red: #ef4444;
  --orange: #f97316;
  --text: #1e293b;
  --muted: #64748b;
  --font: 'Segoe UI', system-ui, sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 15px; }
a { color: var(--accent); text-decoration: none; }

.header { background: #1a1d27; padding: 12px 18px; display: flex; align-items: center; justify-content: space-between; gap: 12px; position: sticky; top: 0; z-index: 100; flex-wrap: wrap; }
.logo { font-size: 18px; font-weight: 800; color: var(--accent); letter-spacing: -0.5px; white-space: nowrap; }
.logo span { color: #e2e8f0; }
.hdr-sub { font-size: 11px; color: #94a3b8; }
.hdr-ver { font-size: 10px; color: #64748b; font-weight: 700; }

#update-banner { display: none; background: #f59e0b; color: #1a1d27; padding: 10px 18px; font-size: 13px; font-weight: 800; text-align: center; cursor: pointer; position: sticky; top: 0; z-index: 200; }
#update-banner:hover { background: #fbbf24; }

.nav { background: #1a1d27; border-bottom: 1px solid #2e3347; display: flex; align-items: center; overflow-x: auto; -webkit-overflow-scrolling: touch; }
.nav button { background: none; border: none; border-bottom: 3px solid transparent; color: #94a3b8; font-size: 13px; font-weight: 700; padding: 12px 18px; cursor: pointer; white-space: nowrap; font-family: var(--font); }
.nav button:hover { color: #e2e8f0; }
.nav button.active { color: var(--accent); border-bottom-color: var(--accent); }

.tab-content { display: none; padding: 16px; max-width: 1300px; margin: 0 auto; }
.tab-content.active { display: block; }
@media (max-width: 640px) { .tab-content { padding: 10px; } }
</style>
</head>
<body>

<div id="update-banner" onclick="plApplyUpdate()">⬆️ Update ready — tap to install the new version</div>

<div class="header">

    <div class="hdr-sub" id="today-badge"></div>
  </div>
</div>

<script>
// ── Standalone shell — DGC Job Planner ──────────────────────────────────────
// Same localStorage keys as the master control panel (dgc_jobs etc.), so on
// the same device/browser the standalone app and the master app share data.
var PLANNER_VERSION = 'v1 — 10 Jun 2026';

function showTab(name, btn) {
  document.querySelectorAll('.tab-content').forEach(function(t){ t.classList.remove('active'); });
  document.querySelectorAll('.nav button').forEach(function(b){ b.classList.remove('active'); });
  var panel = document.getElementById('tab-' + name);
  if (panel) panel.classList.add('active');
  var nb = btn || document.getElementById('nav-' + name);
  if (nb) nb.classList.add('active');
  try {
    if (name === 'dir-planner' && window.buildDirPlannerTab) buildDirPlannerTab();
    if (name === 'dir-jobs' && window.buildDirJobsTab) buildDirJobsTab();
  } catch(e) {}
}

// ── PWA: service worker with visible update button (no cache clearing) ─────
var _plWaitingSW = null;
function plApplyUpdate() {
  if (_plWaitingSW) { _plWaitingSW.postMessage({ type: 'SKIP_WAITING' }); }
}
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').then(function(reg) {
    function trackWaiting(sw) {
      if (!sw) return;
      _plWaitingSW = sw;
      document.getElementById('update-banner').style.display = 'block';
    }
    trackWaiting(reg.waiting); // update already downloaded on a previous visit
    reg.addEventListener('updatefound', function() {
      var newSW = reg.installing;
      if (!newSW) return;
      newSW.addEventListener('statechange', function() {
        if (newSW.state === 'installed' && navigator.serviceWorker.controller) trackWaiting(newSW);
      });
    });
    // Look for updates when the app regains focus and every 15 minutes
    document.addEventListener('visibilitychange', function() {
      if (document.visibilityState === 'visible') reg.update().catch(function(){});
    });
    setInterval(function() { reg.update().catch(function(){}); }, 15 * 60 * 1000);
  }).catch(function(){});
  var _plReloaded = false;
  navigator.serviceWorker.addEventListener('controllerchange', function() {
    if (_plReloaded) return; _plReloaded = true;
    location.reload();
  });
}

document.getElementById('app-version').textContent = PLANNER_VERSION;
document.getElementById('today-badge').textContent = new Date().toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'short', year:'numeric' });
</script>

  // Avg wage margin per person per week (mix of gangers + GWs from real payroll):
  //   Gangers (charged £27.50, cost ~£20.95 all-in): £6.55/hr × 45hrs = £295/wk
  //   GWs (charged £22.00, cost ~£16.44 all-in):    £5.56/hr × 45hrs = £250/wk

  var MONTHLY_OVERHEAD   = 16297;  // £/month — Ash £2k + Harry £2k + office + overheads
  //   Non-wage (vans, insurance, rent, loans, software): £9,544/month
  //   Office girl (24hrs × £20/hr + 12.8% NITP):        £2,253/month  ← confirmed
  //   Bookkeeper:                                         £500/month   ← confirmed

  //   ────────────────────────────────────────────────────────────────────────────
  //   Total overhead (from OH&P profit):                  £16,297/month = £195,564/year

  var PROFIT_PER_MAN_MTH = 3216;   // Used in health panel only

  // ── Timeline drag state (module-level to prevent listener accumulation) ─────

  var _tlMoveHandler    = null;
  var _tlUpHandler      = null;

  // ── Helpers ────────────────────────────────────────────────────────────────
  function fmt(n) { return '£' + Math.round(n).toLocaleString('en-GB'); }
  function clr(v, good, warn) {
    good = good || BENCHMARK_PMPW; warn = warn || good * 0.8;
    return v >= good ? '#22c55e' : v >= warn ? '#f59e0b' : '#ef4444';
  }
  function loadBM()   { try { var s=localStorage.getItem('dgc_bm'); return s?JSON.parse(s):null; } catch(e){return null;} }
  function saveBM(a)  { try { localStorage.setItem('dgc_bm',JSON.stringify(a)); } catch(e){} }
  function defaultBM(){ return [
    {job:'Ballasalla Phase 4', type:'Drainage',  weeks:17, people:6, pmpw:742, notes:'Current contract'},
    {job:'MU Flow Monitoring',  type:'Utilities', weeks:7,  people:2, pmpw:700, notes:'Smaller job'}
  ];}

  // ── Build ──────────────────────────────────────────────────────────────────
  // ── Jobs localStorage ─────────────────────────────────────────────────────
  // ── All default/seeded jobs — single source of truth ──────────────────────
  var JOB_SEEDS = [
    { id:1, name:'Ballasalla Phase 4',        value:500000,  weeks:17, people:6,  ohp:15, profit:80000, startWeek:-14, onTimeline:true,  confirmed:true,  status:'running',   note:'Main drainage — ~3/4 through, demob ~3 Jul. AFP4 to include tarmac. Cash critical.' },
    { id:2, name:'Living Hope Church',         value:185551,  weeks:13, people:4,  ohp:15, profit:0,     startWeek:-2,  onTimeline:false, confirmed:true,  status:'running',   note:'ON STOP (Jun 2026) — off gang loading until restart. Slab & gabion.' },
    { id:3, name:'Slab Works Plots 7-11',      value:209056,  weeks:10, people:3,  ohp:15, profit:0,     startWeek:-3,  onTimeline:true,  confirmed:true,  status:'running',   note:'RUNNING — plots 9+10 paid, 11 in payment, AFP02 submitted. To price: 5, 6, 12–15.' },
    { id:4, name:'Peel Breakwater (DOI)',      value:122995,  weeks:8,  people:5,  ohp:15, profit:0,     startWeek:10,  onTimeline:true,  confirmed:true,  status:'awarded',   note:'AWARDED — August start. Sewage treatment works, Peel harbour. £122,994 brick option. DOI client (IoM Govt).' },
    { id:5, name:'Utmost International (KEBH)',value:500000,  weeks:12, people:4,  ohp:15, profit:0,     startWeek:18,  onTimeline:true,  confirmed:false, status:'tendering',     inPipeline:false, note:'BIDDING — King Edward Bay House, Onchan. Car park waterproofing + structural repair. £500k Simon estimate.' },
    { id:6, name:'Glenfaba Ring Road (GF2)',   value:1289157, weeks:26, people:10, ohp:15, profit:168151,startWeek:8,   onTimeline:true,  confirmed:false, status:'tendering_likely',inPipeline:true,  note:'SUBMITTED 10 Jun 2026 at £1,289,157.05 — awaiting Dandara response, negotiation expected. Internal plan 26 wks / 2 gangs. 97 houses, Peel.' },
    { id:7, name:'MU Flow Monitoring Ph.2',   value:130000,  weeks:12, people:2,  ohp:15, profit:0,     startWeek:52,  onTimeline:false, confirmed:false, status:'placeholder',    inPipeline:false, note:'PLACEHOLDER — Manx Utilities, ~10 more sites. ~£130k estimated. Not imminent.' },
    { id:8, name:'Dandara Industrial Units',   value:310000,  weeks:18, people:4,  ohp:15, profit:40000, startWeek:6,   onTimeline:true,  confirmed:false, status:'tendering_likely',inPipeline:true,  note:'BIDDING — tender received 10 Jun, internal estimate ~£310k (Simon rates). BT8 Balthane, Blocks P & Q, ~26 units / 2,126 m². 17–18 wks work (~22 cal). Gang of 4 — crossover with BA4-S. Start mid–late Jul per Ian. Return date TBC.' }
  ];

  function loadJobs() {
    try {
      var s = localStorage.getItem('dgc_jobs');
      var jobs = s ? JSON.parse(s) : null;

      if (!jobs || !Array.isArray(jobs) || jobs.length === 0) {
        // No data at all — seed with all defaults and save
        try { localStorage.setItem('dgc_jobs_anchor', new Date().toISOString()); } catch(eA0) {}
        saveJobs(JOB_SEEDS);
        return JOB_SEEDS.map(function(j){ return Object.assign({}, j); });
      }

      var changed = false;

      // v1000: anchor — startWeek is relative to the anchor week, not "today".
      // Shift all startWeeks down by full weeks elapsed since anchor, then re-anchor,
      // so bars hold their real-world dates instead of drifting a week later every week.
      try {
        var anchorS = localStorage.getItem('dgc_jobs_anchor');
        var WEEK_MS = 7*24*60*60*1000;
        if (!anchorS) {
          localStorage.setItem('dgc_jobs_anchor', new Date().toISOString());
        } else {
          var elapsedWks = Math.floor((new Date().getTime() - new Date(anchorS).getTime()) / WEEK_MS);
          if (elapsedWks >= 1) {
            jobs.forEach(function(j){ if (typeof j.startWeek === 'number') j.startWeek -= elapsedWks; });
            localStorage.setItem('dgc_jobs_anchor', new Date(new Date(anchorS).getTime() + elapsedWks*WEEK_MS).toISOString());
            changed = true;
          }
        }
      } catch(eA1) {}

      // v1000: tombstones — seeds the user deleted stay deleted
      var tombstones = [];
      try { tombstones = JSON.parse(localStorage.getItem('dgc_jobs_deleted')||'[]'); } catch(eT) { tombstones = []; }

      // Merge: add any seeded job that isn't already in localStorage (by id OR close name match)
      JOB_SEEDS.forEach(function(seed) {
        if (tombstones.indexOf(seed.id) >= 0) return;
        var exists = jobs.find(function(j) {
          return j.id === seed.id || (j.name && seed.name && j.name.toLowerCase().replace(/\s+/g,'').indexOf(seed.name.toLowerCase().replace(/\s+/g,'').substring(0,8)) >= 0);
        });
        if (!exists) { jobs.push(Object.assign({}, seed)); changed = true; }
      });

      // ONE-TIME v1000 migration: bring director jobs in line with 10 Jun 2026 reality
      if (!localStorage.getItem('dgc_v1000_jobs')) {
        jobs.forEach(function(j) {
          var nm = (j.name||'').toLowerCase();
          if (nm.indexOf('glenfaba') >= 0) {
            j.name = 'Glenfaba Ring Road (GF2)'; j.value = 1289157; j.weeks = 26; j.people = 10; j.profit = 168151; j.status = 'tendering_likely';
            j.note = 'SUBMITTED 10 Jun 2026 at £1,289,157.05 — awaiting Dandara response, negotiation expected. Internal plan 26 wks / 2 gangs. 97 houses, Peel.';
          }
          if (nm.indexOf('living hope') >= 0 && j.status === 'running') {
            j.onTimeline = false;
            j.note = 'ON STOP (Jun 2026) — off gang loading until restart. Slab & gabion.';
          }
          if (nm.indexOf('ballasalla phase 4') >= 0 && j.value === 450142) {
            j.value = 500000;
            j.note = 'Main drainage — ~3/4 through, demob ~3 Jul. AFP4 to include tarmac. Cash critical.';
          }
          if (nm.indexOf('slab works') >= 0) {
            j.confirmed = true; j.status = 'running';
            j.note = 'RUNNING — plots 9+10 paid, 11 in payment, AFP02 submitted. To price: 5, 6, 12–15.';
          }
        });
        localStorage.setItem('dgc_v1000_jobs', '1');
        changed = true;
      }

      // ONE-TIME v1001 migration: rename bidding→tendering, estimate→tendering_likely, add inPipeline
      if (!localStorage.getItem('dgc_v1001_status')) {
        jobs.forEach(function(j) {
          if (j.status === 'bidding') j.status = 'tendering';
          if (j.status === 'estimate') j.status = 'tendering_likely';
          if (j.inPipeline === undefined) j.inPipeline = true;
        });
        localStorage.setItem('dgc_v1001_status', '1');
        changed = true;
      }

      // Ensure inPipeline is set on any job that doesn't have it
      jobs.forEach(function(j) {
        if (j.inPipeline === undefined) { j.inPipeline = true; changed = true; }
      });

      // Fix undefined/null onTimeline → true
      jobs.forEach(function(j) {
        if (j.onTimeline === undefined || j.onTimeline === null) { j.onTimeline = true; changed = true; }
      });

      // ONE-TIME v224 migration: show all jobs on planner by default on first v224+ load.
      // After this flag is set, user's manual hide choices are respected permanently.
      // User can always use "Show ALL Jobs" button to reset.
      if (!localStorage.getItem('dgc_v224_init')) {
        jobs.forEach(function(j) { j.onTimeline = true; });
        localStorage.setItem('dgc_v224_init', '1');
        changed = true;
      }

      // ONE-TIME value fix: MU Flow was incorrectly seeded at £500,000. Correct to £130,000.
      jobs.forEach(function(j) {
        if ((j.id === 7 || (j.name && j.name.toLowerCase().indexOf('mu flow') >= 0)) && j.value === 500000) {
          j.value = 130000; j.weeks = 12; j.people = 2; changed = true;
        }
      });

      if (changed) saveJobs(jobs);
      return jobs;
    } catch(e) {
      return JOB_SEEDS.map(function(j){ return Object.assign({}, j); });
    }
  }
  function saveJobs(jobs) { try { localStorage.setItem('dgc_jobs', JSON.stringify(jobs)); } catch(e) {} }

    + '</div>'

    var el = document.getElementById('dir-planner-panel');
    if (!el) return;

    var html = '<div style="padding:0 0 24px;">'

    // ── Header ──
    + '<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:14px;">'
    + '<div style="display:flex;align-items:center;gap:10px;">'

    + '</div>'
    + '<div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;">'
    + (function(){

  // ── v1000/v1001: export / import all director planner data ──
  var DP_DATA_KEYS = ['dgc_jobs','dgc_job_history','dgc_jobs_anchor','dgc_jobs_deleted','dgc_avail_staff','dgc_overhead_staff'];
  window.dpExportJobs = function() {
    var backup = { exportedAt: new Date().toISOString(), type:'dgc-director-planner', version:'v1000', data:{} };
    DP_DATA_KEYS.forEach(function(k) {
      try { var v = localStorage.getItem(k); if (v !== null) backup.data[k] = v; } catch(e) {}
    });
    var json = JSON.stringify(backup, null, 2);
    try {
      var blob = new Blob([json], {type:'application/json'});
      var a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'dgc-job-planner-' + new Date().toISOString().slice(0,10) + '.json';
      document.body.appendChild(a); a.click();
      setTimeout(function(){ try { URL.revokeObjectURL(a.href); document.body.removeChild(a); } catch(e2) {} }, 500);
    } catch(e3) { alert('Export failed: ' + e3.message); }
  };
  window.dpImportJobs = function(input) {
    if (!input || !input.files || !input.files[0]) return;
    var reader = new FileReader();
    reader.onload = function(e) {
      try {
        var backup = JSON.parse(e.target.result);
        if (!backup || backup.type !== 'dgc-director-planner' || !backup.data) {
          alert('Not a Job Planner export file.'); return;
        }
        var jobCount = 0;
        try { jobCount = (JSON.parse(backup.data.dgc_jobs||'[]')||[]).length; } catch(eC) {}
        if (!confirm('Import ' + jobCount + ' jobs from backup dated ' + (backup.exportedAt||'unknown').slice(0,10) + '?\n\nThis replaces the planner data on this device.')) return;
        DP_DATA_KEYS.forEach(function(k) {
          if (backup.data[k] !== undefined && backup.data[k] !== null) {
            try { localStorage.setItem(k, backup.data[k]); } catch(eS) {}
          }
        });
        buildDirPlannerTab();
        alert('Import complete — planner updated.');
      } catch(err) { alert('Could not read file: ' + err.message); }
    };
    reader.readAsText(input.files[0]);
    input.value = '';
  };

  window.dpRenderJobCards = function() {

        + '<button onclick="djDeleteJob('+idx+')" style="padding:6px 10px;background:transparent;border:1px solid #ef444444;border-radius:7px;color:#ef4444;font-size:11px;font-weight:700;cursor:pointer;flex-shrink:0;">✕</button>'

        + dpjField('Weeks', 'dpj-wks-'+idx, 'number', job.weeks, idx)
        + dpjField('People', 'dpj-ppl-'+idx, 'number', job.people, idx)
        + dpjField('OH&P %', 'dpj-ohp-'+idx, 'number', job.ohp||15, idx)
        + '<div>'

        + '<input id="dpj-sw-'+idx+'" type="number" value="'+(job.startWeek||0)+'" oninput="dpjSw('+idx+',this.value)" style="width:100%;padding:6px 8px;border-radius:8px;border:1px solid var(--border);font-size:13px;font-weight:700;background:var(--surface2);color:var(--text);">'
        + '</div>'

        + '<select id="dpj-stat-'+idx+'" oninput="dpjLive('+idx+')" style="width:100%;padding:6px 8px;border-radius:8px;border:1px solid var(--border);font-size:12px;font-weight:700;background:var(--surface2);color:'+col+';border-color:'+col+'44;">'+statusOpts+'</select>'
        + '</div>'

        + '<input type="checkbox" id="dpj-tl-'+idx+'" '+(job.onTimeline!==false?'checked':'')+' onchange="dpjToggle('+idx+')" style="accent-color:#f59e0b;">'
        + '<span style="font-size:11px;font-weight:700;color:'+(job.onTimeline!==false?'#f59e0b':'var(--muted)')+';">On timeline</span>'

        + '<label style="cursor:pointer;display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:7px;background:'+(job.inPipeline!==false?'rgba(16,185,129,.1)':'var(--surface2)')+';border:1px solid '+(job.inPipeline!==false?'#10b98155':'var(--border)')+'">'
        + '<input type="checkbox" id="dpj-pip-'+idx+'" '+(job.inPipeline!==false?'checked':'')+' onchange="dpjToggle('+idx+')" style="accent-color:#10b981;">'
        + '<span style="font-size:11px;font-weight:700;color:'+(job.inPipeline!==false?'#10b981':'var(--muted)')+';">📊 In pipeline</span>'

  function dpjField(label, id, type, val, idx) {

      + '</div>';

  function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

  window.dpjLive = function(idx) {
    // No full re-render — just update profit display if it exists
  };

  window.dpjSw = function(idx, val) {

  window.dpjSave = function(idx) {

    jobs[idx].name    = g('dpj-name-'+idx) || jobs[idx].name;
    jobs[idx].value   = parseFloat(g('dpj-val-'+idx)) || jobs[idx].value;
    jobs[idx].weeks   = parseInt(g('dpj-wks-'+idx)) || jobs[idx].weeks;
    jobs[idx].people  = parseInt(g('dpj-ppl-'+idx)) || jobs[idx].people;
    jobs[idx].ohp     = parseFloat(g('dpj-ohp-'+idx)) || jobs[idx].ohp || 15;

  // ── Monthly cashflow summary ──────────────────────────────────────────────
  window.dpBuildMonthlySummary = function() {
    var el = document.getElementById('dp-monthly-summary');
    if (!el) return;
    var jobs = loadJobs().filter(function(j){ return j.onTimeline !== false; });
    if (!jobs.length) { el.innerHTML = '<div style="color:var(--muted);font-size:12px;padding:10px 0;">No jobs on planner yet. Add jobs on the Jobs tab.</div>'; return; }

    // Build week-by-week data for next 52 weeks from today
    var FUTURE_WKS = 60; // slightly beyond a year so December shows
    var turnoverByWeek = [];
    var profitWkArr = [];
    var staffWkArr = [];
    for (var i = 0; i < FUTURE_WKS; i++) { turnoverByWeek[i] = 0; profitWkArr[i] = 0; staffWkArr[i] = 0; }

    jobs.forEach(function(j) {
      if (j.inPipeline === false) return; // excluded from financial projections
      var sw = j.startWeek || 0;   // weeks relative to today (negative = past)
      var wks = j.weeks || 1;
      var turnoverWk = (j.value || 0) / wks;
      var profitOHP  = jobProfit(j) / wks;
      var wageWk     = (j.people || 0) * AVG_WAGE_MARGIN_PW;
      var profitWk   = profitOHP + wageWk;
      for (var w = 0; w < FUTURE_WKS; w++) {
        // w = 0 is this week, relative to today
        if (w >= sw && w < sw + wks) {
          turnoverByWeek[w] += turnoverWk;
          profitWkArr[w]    += profitWk;
          staffWkArr[w]     = Math.max(staffWkArr[w], staffWkArr[w] + 0); // accumulate below
        }
      }
    });

    // Re-do staff (sum, not max per job) — only pipeline jobs
    for (var s = 0; s < FUTURE_WKS; s++) staffWkArr[s] = 0;
    jobs.forEach(function(j2) {
      if (j2.inPipeline === false) return;
      var sw2 = j2.startWeek || 0;
      var wks2 = j2.weeks || 1;
      for (var w2 = 0; w2 < FUTURE_WKS; w2++) {
        if (w2 >= sw2 && w2 < sw2 + wks2) staffWkArr[w2] += (j2.people || 0);
      }
    });

    // Group by calendar month
    var today = new Date(); today.setHours(0,0,0,0);
    var months = [];
    var monthMap = {};
    for (var wk = 0; wk < FUTURE_WKS; wk++) {
      var d = new Date(today.getTime() + wk * 7 * 24 * 60 * 60 * 1000);
      var mkey = d.getFullYear() + '-' + d.getMonth();
      if (!monthMap[mkey]) {
        var mLabel = d.toLocaleString('en-GB', {month:'short', year:'numeric'});
        monthMap[mkey] = { label: mLabel, turnover: 0, profit: 0, staff: 0, active: false };
        months.push(monthMap[mkey]);
      }
      monthMap[mkey].turnover += turnoverByWeek[wk];
      monthMap[mkey].profit   += profitWkArr[wk];
      monthMap[mkey].staff     = Math.max(monthMap[mkey].staff, staffWkArr[wk]);
      if (staffWkArr[wk] > 0 || turnoverByWeek[wk] > 0) monthMap[mkey].active = true;
    }

    var visibleMonths = months.filter(function(m){ return m.active; });
    if (!visibleMonths.length) { el.innerHTML = '<div style="color:var(--muted);font-size:12px;padding:10px 0;">No future work scheduled on the planner.</div>'; return; }

    var html = '<div style="overflow-x:auto;">'
      + '<table style="border-collapse:collapse;width:100%;min-width:500px;font-size:12px;">'
      + '<thead>'
      + '<tr style="background:var(--surface2);border-bottom:2px solid var(--border);">'
      + '<th style="padding:8px 12px;text-align:left;font-weight:700;color:var(--text);">Month</th>'
      + '<th style="padding:8px 12px;text-align:right;font-weight:700;color:var(--muted);">Turnover</th>'
      + '<th style="padding:8px 12px;text-align:right;font-weight:700;color:var(--muted);">Profit</th>'
      + '<th style="padding:8px 12px;text-align:right;font-weight:700;color:var(--muted);">Peak staff</th>'
      + '<th style="padding:8px 12px;text-align:right;font-weight:700;color:var(--muted);">Net vs OH</th>'
      + '</tr>'
      + '</thead><tbody>';

    visibleMonths.forEach(function(m) {
      var net = m.profit - MONTHLY_OVERHEAD;
      var col = net > 8000 ? '#22c55e' : net > 0 ? '#f59e0b' : '#ef4444';
      var netStr = (net >= 0 ? '+£' : '-£') + Math.abs(Math.round(net)).toLocaleString('en-GB');
      html += '<tr style="border-bottom:1px solid var(--border);">'
        + '<td style="padding:8px 12px;font-weight:700;color:var(--text);">' + m.label + '</td>'
        + '<td style="padding:8px 12px;text-align:right;color:var(--text);">£' + Math.round(m.turnover).toLocaleString('en-GB') + '</td>'
        + '<td style="padding:8px 12px;text-align:right;font-weight:800;color:'+col+';">£' + Math.round(m.profit).toLocaleString('en-GB') + '</td>'
        + '<td style="padding:8px 12px;text-align:right;">'
        + '<span style="font-weight:900;color:var(--text);">' + m.staff + '</span><span style="color:var(--muted);font-size:10px;"> ppl</span>'
        + '</td>'
        + '<td style="padding:8px 12px;text-align:right;font-weight:900;color:'+col+';">' + netStr + '</td>'
        + '</tr>';
    });

    // Totals row
    var totTurnover = visibleMonths.reduce(function(s,m){ return s + m.turnover; }, 0);
    var totProfit   = visibleMonths.reduce(function(s,m){ return s + m.profit;   }, 0);
    var totNet      = totProfit - MONTHLY_OVERHEAD * visibleMonths.length;
    var totCol      = totNet > 0 ? '#22c55e' : '#ef4444';
    html += '<tr style="background:var(--surface2);border-top:2px solid var(--border);">'
      + '<td style="padding:8px 12px;font-weight:900;color:var(--text);">Total</td>'
      + '<td style="padding:8px 12px;text-align:right;font-weight:900;color:var(--text);">£' + Math.round(totTurnover).toLocaleString('en-GB') + '</td>'
      + '<td style="padding:8px 12px;text-align:right;font-weight:900;color:'+totCol+';">£' + Math.round(totProfit).toLocaleString('en-GB') + '</td>'
      + '<td style="padding:8px 12px;text-align:right;">—</td>'
      + '<td style="padding:8px 12px;text-align:right;font-weight:900;color:'+totCol+';">' + (totNet >= 0 ? '+£' : '-£') + Math.abs(Math.round(totNet)).toLocaleString('en-GB') + '</td>'
      + '</tr>';

    // Annual pipeline summary (next 12 months only)
    var annualJobs = loadJobs().filter(function(j){ return j.inPipeline !== false; });
    var annualTurnover = annualJobs.reduce(function(s,j){ return s + (j.value||0); }, 0);
    var annualProfit   = annualJobs.reduce(function(s,j){ return s + jobProfit(j); }, 0);
    var excludedCount  = loadJobs().filter(function(j){ return j.inPipeline === false; }).length;

    html += '</tbody></table></div>'
      + '<div style="margin-top:14px;padding:12px 14px;border-radius:10px;background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.25);display:flex;gap:20px;flex-wrap:wrap;">'
      + '<div><div style="font-size:10px;font-weight:800;text-transform:uppercase;color:#10b981;letter-spacing:.05em;">Annual pipeline turnover</div>'
      + '<div style="font-size:22px;font-weight:900;color:var(--text);">£'+Math.round(annualTurnover).toLocaleString('en-GB')+'</div></div>'
      + '<div><div style="font-size:10px;font-weight:800;text-transform:uppercase;color:#10b981;letter-spacing:.05em;">Annual pipeline profit</div>'
      + '<div style="font-size:22px;font-weight:900;color:#10b981;">£'+Math.round(annualProfit).toLocaleString('en-GB')+'</div></div>'
      + (excludedCount > 0 ? '<div style="align-self:center;font-size:11px;color:var(--muted);">'+excludedCount+' job'+(excludedCount>1?'s':'')+' excluded (📊 off)</div>' : '')
      + '</div>'
      + '<div style="font-size:10px;color:var(--muted);margin-top:8px;">Pipeline figures include only jobs with 📊 In pipeline switched on. Monthly cashflow = contract value spread evenly across job weeks. Profit = OH&P markup + £265/person/week wage margin. Net vs OH = profit minus £16,297/month overhead. Numbers are estimates — actual payment lags by AFP cycle.</div>';

    el.innerHTML = html;
  };

  // ── dj- (director jobs tab) helper functions ────────────────────────────────

    + '<div style="font-size:10px;color:var(--muted);margin-top:3px;text-align:center;">' + help + '</div>'

  // Render the jobs list into #dj-list and #dj-total

    listEl.innerHTML = jobs.map(function(job, idx) {

      var totalWkProfit = profit + (job.people * AVG_WAGE_MARGIN_PW * job.weeks);
      var pmpw    = (job.people > 0 && job.weeks > 0) ? Math.round(totalWkProfit / job.people / job.weeks) : 0;
      var pmpwCol = pmpw >= 700 ? '#22c55e' : pmpw >= 500 ? '#f59e0b' : '#ef4444';

        + '<div>'
        + '<div style="font-size:14px;font-weight:800;color:var(--text);">' + (job.name||'Unnamed') + '</div>'
        + '<div style="font-size:11px;color:var(--muted);margin-top:2px;">📅 '+dateLabel+'</div>'
        + '</div>'
        + '<div style="display:flex;gap:6px;">'
        + '<button onclick="djSaveJob('+idx+')" style="padding:5px 11px;background:rgba(34,197,94,0.1);border:1px solid #22c55e44;border-radius:6px;color:#22c55e;font-size:11px;font-weight:700;cursor:pointer;">✓ Save</button>'
        + '<button onclick="djDeleteJob('+idx+')" style="padding:5px 11px;background:transparent;border:1px solid #ef444444;border-radius:6px;color:#ef4444;font-size:11px;font-weight:700;cursor:pointer;">✕ Remove</button>'
        + '<button onclick="djArchiveJob('+idx+')" style="padding:5px 11px;background:rgba(148,163,184,0.1);border:1px solid #94a3b844;border-radius:6px;color:#94a3b8;font-size:11px;font-weight:700;cursor:pointer;">📦 Archive</button>'
        + '</div></div>'
        + '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(115px,1fr));gap:8px;margin-bottom:10px;">'
        + djJobField('Name','dj-job-name-'+idx,'text',job.name||'',idx)
        + djJobField('Value (£)','dj-job-val-'+idx,'number',job.value,idx)
        + djJobField('Weeks on site','dj-job-wks-'+idx,'number',job.weeks,idx)
        + djJobField('People needed','dj-job-ppl-'+idx,'number',job.people,idx)
        + djJobField('Profit % (OH&P)','dj-job-ohp-'+idx,'number',job.ohp||15,idx)
        + '<div>'
        + '<div style="font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:3px;">Start (weeks from today)</div>'
        + '<input id="dj-job-sw-'+idx+'" type="number" value="'+(job.startWeek||0)+'" placeholder="0 = this week" style="width:100%;padding:6px 9px;border-radius:8px;border:1px solid var(--border);font-size:13px;font-weight:700;background:var(--surface2);color:var(--text);" oninput="(function(){var v=parseInt(this.value);if(!isNaN(v)){var jj=window.loadJobs?window.loadJobs():[];if(jj['+idx+']){jj['+idx+'].startWeek=v;window.saveJobs&&window.saveJobs(jj);try{if(document.getElementById(\'dp-tl-inner\')){dpRenderTimeline();dpBuildMonthlySummary();}}catch(e){}}}}).call(this)">'
        + '<div style="font-size:10px;color:var(--muted);margin-top:2px;">'+dateLabel+'</div>'
        + '</div>'
        + '</div>'
        + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">'
        + '<div><div style="font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:3px;">Profit on this job (£)</div>'
        + '<input id="dj-job-pft-'+idx+'" type="number" value="'+(job.profit||'')+'" placeholder="Leave blank = auto 15%" oninput="djLiveCalc('+idx+')" style="width:100%;padding:7px 10px;border-radius:8px;border:2px solid '+col+'66;font-size:14px;font-weight:900;background:var(--surface2);color:var(--text);">'
        + '<div style="font-size:10px;color:var(--muted);margin-top:2px;">Auto at 15%: '+fmt(calcProfit)+'</div>'
        + '</div>'
        + '<div style="padding:10px 12px;border-radius:8px;background:'+col+'11;border:1px solid '+col+'33;">'
        + '<div id="dj-live-profit-'+idx+'">'
        + '<div style="font-size:28px;font-weight:900;color:'+col+';line-height:1;">'+fmt(profit)+'</div>'
        + '<div style="font-size:10px;color:var(--muted);">profit · '+fmt(profitWk)+'/wk</div>'
        + '</div>'
        + '<div style="margin-top:6px;padding:4px 8px;background:'+pmpwCol+'18;border-radius:6px;text-align:center;">'
        + '<div id="dj-live-pmpw-'+idx+'" style="font-size:14px;font-weight:900;color:'+pmpwCol+';">'+fmt(pmpw)+'/person/week</div>'
        + '<div style="font-size:9px;color:var(--muted);">profit per man per week</div>'
        + '</div></div>'
        + '</div>'
        + '<div id="dj-suggestions-'+idx+'" style="margin-top:8px;font-size:11px;color:var(--muted);"></div>'
        + '<div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;border-top:1px solid var(--border);padding-top:10px;">'
        + '<label style="cursor:pointer;display:flex;align-items:center;gap:6px;padding:7px 12px;border-radius:8px;background:'+(job.onTimeline!==false?'rgba(245,158,11,0.12)':'var(--surface2)')+';border:1px solid '+(job.onTimeline!==false?'#f59e0b88':'var(--border)')+';transition:all 0.15s;">'
        + '<input type="checkbox" id="dj-job-tl-'+idx+'" '+(job.onTimeline!==false?'checked':'')+' onchange="djAutoSave('+idx+')" style="accent-color:#f59e0b;width:14px;height:14px;">'
        + '<span style="font-size:12px;font-weight:700;color:'+(job.onTimeline!==false?'#f59e0b':'var(--muted)')+';">📅 Show on planner</span>'
        + '</label>'
        + '<label style="cursor:pointer;display:flex;align-items:center;gap:6px;padding:7px 12px;border-radius:8px;background:'+(job.inPipeline!==false?'rgba(16,185,129,0.12)':'var(--surface2)')+';border:1px solid '+(job.inPipeline!==false?'#10b98188':'var(--border)')+';transition:all 0.15s;">'
        + '<input type="checkbox" id="dj-job-pip-'+idx+'" '+(job.inPipeline!==false?'checked':'')+' onchange="djAutoSave('+idx+')" style="accent-color:#10b981;width:14px;height:14px;">'
        + '<span style="font-size:12px;font-weight:700;color:'+(job.inPipeline!==false?'#10b981':'var(--muted)')+';">📊 Count in annual figures</span>'
        + '</label>'
        + '</div>'
        + '<div style="margin-top:10px;">'
        + '<input id="dj-job-note-'+idx+'" type="text" value="'+(job.note||'')+'" placeholder="Status note — e.g. Week 3 of 17, drainage complete" style="width:100%;padding:6px 10px;border-radius:8px;border:1px dashed var(--border);font-size:12px;color:var(--muted);background:var(--surface2);">'
        + '</div>'
        + '</div>';
    }).join('');

    // Trigger initial suggestions for each job (after HTML is injected)
    jobs.forEach(function(job2, i2) {
      setTimeout(function() {
        djUpdateSuggestions(i2,
          job2.value, job2.weeks, job2.people, job2.ohp||15,
          jobProfit(job2),
          (job2.people>0&&job2.weeks>0) ? Math.round((jobProfit(job2)+job2.people*AVG_WAGE_MARGIN_PW*job2.weeks)/job2.people/job2.weeks) : 0
        );
      }, 50);
    });

    // Totals
    function weeksRemainingDj(j) {
      var sw = j.startWeek||0; var ew = sw + (j.weeks||1);
      if (ew <= 0) return 0; if (sw >= 52) return 0;
      if (sw >= 0) return j.weeks||1;
      return Math.max(0, ew);
    }
    var pipJobs      = jobs.filter(function(j){ return j.inPipeline !== false; });
    var totalProfit  = pipJobs.reduce(function(s,j){ return s + jobProfit(j); }, 0);
    var annualTurnover = pipJobs.reduce(function(s,j){ return s + (j.value||0); }, 0);
    var totalPeople  = jobs.reduce(function(s,j){ return s + (j.people||0); }, 0);
    var gangCeiling  = (function(){ var v=parseInt(localStorage.getItem('dgc_avail_staff')); return (v>0&&v<100)?v:10; })();
    var ovhdStaff    = (function(){ var v=parseInt(localStorage.getItem('dgc_overhead_staff')); return (v>=0&&v<50)?v:2; })();
    var totalHeadcount = gangCeiling + ovhdStaff;
    var monthlyOhp = jobs.reduce(function(s,j){
      var wr = weeksRemainingDj(j);
      if (wr <= 0) return s;
      return s + jobProfit(j) / Math.max(1, j.weeks) * Math.min(4.333, wr * 4.333 / (j.weeks||1));
    }, 0);
    var totalPmpw = 0; var pmpwCount = 0;
    jobs.forEach(function(j){
      if (j.people > 0 && j.weeks > 0) {
        var tp = jobProfit(j) + (j.people * AVG_WAGE_MARGIN_PW * j.weeks);
        totalPmpw += tp / j.people / j.weeks;
        pmpwCount++;
      }
    });
    var avgPmpw = pmpwCount > 0 ? Math.round(totalPmpw / pmpwCount) : 0;
    var avgPmpwCol = avgPmpw >= 700 ? '#22c55e' : avgPmpw >= 500 ? '#f59e0b' : '#ef4444';
    var monthlyNet   = monthlyOhp - MONTHLY_OVERHEAD;
    var peopleLeft   = gangCeiling - totalPeople;
    var netCol       = monthlyNet > 5000 ? '#22c55e' : monthlyNet > 0 ? '#f59e0b' : '#ef4444';
    if (totalEl) totalEl.innerHTML =
    '<div style="border-top:2px solid var(--border);padding-top:14px;margin-top:4px;">'
    + '<div style="font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;">Combined — all jobs right now</div>'
    + '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:12px;">'
    + dirNum('Pipeline profit', fmt(totalProfit), 'in-pipeline jobs only')
    + dirNum('Annual pipeline', '£'+Math.round(annualTurnover/1000)+'k', 'total contract value — in pipeline')
    + dirNum('Profit/month (avg)', fmt(monthlyOhp), 'spread over active weeks')
    + dirNum('Overhead/month', fmt(MONTHLY_OVERHEAD), 'fixed — always running')
    + dirNum('Avg £/person/week', '<span style="color:'+avgPmpwCol+'">£'+avgPmpw+'</span>', 'across all jobs — benchmark is £700–900')
    + '<div style="background:var(--surface2);border:2px solid '+netCol+'44;border-radius:10px;padding:12px;text-align:center;">'
    + '<div style="font-size:24px;font-weight:900;color:'+netCol+';line-height:1;margin-bottom:3px;">'+(monthlyNet>=0?'+':'')+fmt(monthlyNet)+'/month</div>'
    + '<div style="font-size:10px;color:'+netCol+';font-weight:700;">'+(monthlyNet>=0?'✓ Profitable':'⚠ Losing money')+'</div>'
    + '</div>'
    + '</div>'
    + '<div style="display:flex;gap:20px;flex-wrap:wrap;align-items:center;margin-bottom:8px;padding:10px 12px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);">'
    + '<div style="font-size:12px;color:var(--muted);">Gang: <strong style="color:var(--text);">'+gangCeiling+'</strong></div>'
    + '<div style="font-size:12px;color:var(--muted);">+ Office: <strong style="color:var(--text);">'+ovhdStaff+'</strong></div>'
    + '<div style="font-size:13px;font-weight:900;color:var(--text);">= Total headcount: '+totalHeadcount+'</div>'
    + '<div style="font-size:11px;color:var(--muted);">(Edit gang &amp; office in Planner header)</div>'
    + '</div>'
    + '<div style="font-size:12px;color:var(--muted);margin-bottom:5px;">People on jobs: <strong style="color:'+(totalPeople>gangCeiling?'#ef4444':'var(--text)')+';">'+totalPeople+' of '+gangCeiling+'</strong>'+(peopleLeft>0?' · <span style="color:#22c55e;">'+peopleLeft+' free</span>':peopleLeft<0?' · <span style="color:#ef4444;">Need '+Math.abs(peopleLeft)+' more</span>':'')+'</div>'
    + '<div style="background:var(--border);border-radius:4px;height:8px;overflow:hidden;">'
    + '<div style="width:'+Math.min(100,Math.round(totalPeople/gangCeiling*100))+'%;background:'+(totalPeople>gangCeiling?'#ef4444':'#22c55e')+';height:100%;border-radius:4px;"></div>'
    + '</div>'
    + (function(){
        var msPerWeek2 = 7*24*60*60*1000;
        var today3 = new Date();
        var maxEndWeek = 0;
        jobs.forEach(function(j){
          if (!j.confirmed) return;
          var ew = (j.startWeek||0) + (j.weeks||1);
          if (ew > maxEndWeek) maxEndWeek = ew;
        });
        var coverageWeeks = Math.max(0, maxEndWeek);
        var coverageDate  = new Date(today3.getTime() + coverageWeeks * msPerWeek2);
        var coverageFmt   = coverageDate.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
        var winByDate     = new Date(coverageDate.getTime() - 8 * msPerWeek2);
        var winByFmt      = winByDate.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
        var pipCol        = coverageWeeks > 12 ? '#22c55e' : coverageWeeks > 6 ? '#f59e0b' : '#ef4444';
        return '<div style="margin-top:10px;padding:12px 14px;border-radius:10px;background:'+pipCol+'11;border:1px solid '+pipCol+'44;font-size:12px;color:var(--text);line-height:1.6;">'
          + '<strong style="color:'+pipCol+';">📅 Confirmed work covers overhead until '+coverageFmt+'</strong>'
          + (coverageWeeks > 0 ? ' ('+coverageWeeks+' weeks)' : '')
          + (coverageWeeks < 52 ? '<br><span style="color:var(--muted);">Win next job by <strong style="color:'+pipCol+';">'+winByFmt+'</strong> to avoid a gap.</span>' : '')
          + '</div>';
      })()
    + '</div>';
  }

  function djJobField(label, id, type, val, jobIdx) {
    return '<div>'
    + '<div style="font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:3px;">'+label+'</div>'
    + '<input id="'+id+'" type="'+type+'" value="'+(val===0?'0':(val||''))+'" oninput="djLiveCalc('+jobIdx+')" style="width:100%;padding:6px 9px;border-radius:8px;border:1px solid var(--border);font-size:13px;font-weight:700;background:var(--surface2);color:var(--text);">'
    + '</div>';
  }

  window.djSaveJob = function(idx) {
    var jobs = loadJobs(); if (!jobs[idx]) return;
    var g = function(id){ var el=document.getElementById(id); return el?el.value:''; };
    var pft = parseFloat(g('dj-job-pft-'+idx));
    var tlEl = document.getElementById('dj-job-tl-'+idx);
    jobs[idx].name    = g('dj-job-name-'+idx) || jobs[idx].name;
    jobs[idx].value   = parseFloat(g('dj-job-val-'+idx)) || jobs[idx].value;
    jobs[idx].weeks   = parseFloat(g('dj-job-wks-'+idx)) || jobs[idx].weeks;
    jobs[idx].people  = parseInt(g('dj-job-ppl-'+idx))   || jobs[idx].people;
    jobs[idx].ohp     = parseFloat(g('dj-job-ohp-'+idx)) || jobs[idx].ohp || 15;
    var pipEl = document.getElementById('dj-job-pip-'+idx);
    jobs[idx].profit     = pft > 0 ? pft : 0;
    jobs[idx].onTimeline = tlEl  ? tlEl.checked  : true;
    jobs[idx].inPipeline = pipEl ? pipEl.checked : true;
    jobs[idx].note       = g('dj-job-note-'+idx) || '';
    jobs[idx].confirmed  = ['running','awarded','confirmed'].indexOf(jobs[idx].status||'') >= 0;
    saveJobs(jobs); djRenderJobs();
    // Always sync planner if it has been built
    try {
      if (document.getElementById('dp-tl-inner')) { dpRenderTimeline(); dpBuildMonthlySummary(); }
    } catch(e) {}
  };

  window.djDeleteJob = function(idx) {
    var jobs = loadJobs();
    // v1000: tombstone seeded jobs so loadJobs doesn't resurrect them on next load
    var dead = jobs[idx];
    if (dead && dead.id !== undefined) {
      try {
        var tomb = JSON.parse(localStorage.getItem('dgc_jobs_deleted')||'[]');
        if (tomb.indexOf(dead.id) < 0) { tomb.push(dead.id); localStorage.setItem('dgc_jobs_deleted', JSON.stringify(tomb)); }
      } catch(eD) {}
    }
    jobs.splice(idx,1); saveJobs(jobs); djRenderJobs();
    try { if (document.getElementById('dp-tl-inner')) { dpRenderTimeline(); dpBuildMonthlySummary(); } } catch(e) {}
  };

  // ── Auto-save checkbox state and instantly refresh planner ────────────────
  window.djAutoSave = function(idx) {
    var jobs = loadJobs();
    if (!jobs[idx]) return;
    var tlEl  = document.getElementById('dj-job-tl-'  + idx);
    var pipEl = document.getElementById('dj-job-pip-' + idx);
    if (tlEl)  jobs[idx].onTimeline = tlEl.checked;
    if (pipEl) jobs[idx].inPipeline = pipEl.checked;
    jobs[idx].confirmed = ['running','awarded','confirmed'].indexOf(jobs[idx].status) >= 0;
    saveJobs(jobs);
    // Refresh planner timeline if already open
    try {
      if (document.getElementById('dp-tl-inner')) { dpRenderTimeline(); dpBuildMonthlySummary(); }
    } catch(e) {}

  // ── Feature 1: Live recalculation on job cards ─────────────────────────────
  window.djLiveCalc = function(idx) {
    idx = parseInt(idx, 10);   // always integer
    var jobs = loadJobs();
    var job  = jobs[idx];
    if (!job) return;
    // Helper: read input value; return null if field is empty (user is mid-type)
    var gNum = function(id) {
      var el = document.getElementById(id);
      if (!el) return null;
      var raw = el.value.trim();
      if (raw === '' || raw === '-') return null;   // field cleared — don't snap back
      return parseFloat(raw);
    };
    var gInt = function(id) {
      var el = document.getElementById(id);
      if (!el) return null;
      var raw = el.value.trim();
      if (raw === '') return null;
      return parseInt(raw, 10);
    };
    // Use live input value; fall back to saved only if field is completely empty
    var value  = gNum('dj-job-val-'+idx);  if (value  === null) value  = job.value  || 0;
    var weeks  = gNum('dj-job-wks-'+idx);  if (weeks  === null || weeks  <= 0) weeks  = job.weeks  || 1;
    var people = gInt('dj-job-ppl-'+idx);  if (people === null || people <= 0) people = job.people || 1;
    var ohp    = gNum('dj-job-ohp-'+idx);  if (ohp    === null || isNaN(ohp)) ohp    = job.ohp    || 15;
    var pftIn  = gNum('dj-job-pft-'+idx);
    var profit = (pftIn !== null && pftIn > 0) ? pftIn : value * (ohp/100) / (1 + ohp/100);
    var profitWk = weeks > 0 ? profit / weeks : 0;
    var totalWkProfit = profit + (people * AVG_WAGE_MARGIN_PW * weeks);
    var pmpw = (people > 0 && weeks > 0) ? Math.round(totalWkProfit / people / weeks) : 0;
    var col = profit > 50000 ? '#22c55e' : profit > 20000 ? '#f59e0b' : '#ef4444';
    var pmpwCol = pmpw >= 700 ? '#22c55e' : pmpw >= 500 ? '#f59e0b' : '#ef4444';

    // Update the live display elements
    var profitDisplay = document.getElementById('dj-live-profit-'+idx);
    if (profitDisplay) {
      profitDisplay.innerHTML =
        '<div style="font-size:28px;font-weight:900;color:'+col+';line-height:1;">£'+Math.round(profit).toLocaleString('en-GB')+'</div>'
        + '<div style="font-size:10px;color:var(--muted);">profit · £'+Math.round(profitWk).toLocaleString('en-GB')+'/wk</div>';
    }
    var pmpwDisplay = document.getElementById('dj-live-pmpw-'+idx);
    if (pmpwDisplay) {
      pmpwDisplay.style.color = pmpwCol;
      pmpwDisplay.textContent = '£'+pmpw+'/person/week';
    }
    // Update what-if suggestions
    djUpdateSuggestions(idx, value, weeks, people, ohp, profit, pmpw);
  };

  // ── Feature 4: What-if suggestions per job card ────────────────────────────
  function djUpdateSuggestions(idx, value, weeks, people, ohp, profit, pmpw) {
    var el = document.getElementById('dj-suggestions-'+idx);
    if (!el) return;
    var tips = [];
    var calcPmpw = function(v, w, p, o) {
      if (!p || !w) return 0;
      var prof = v * (o/100) / (1 + o/100);
      return Math.round((prof + p * AVG_WAGE_MARGIN_PW * w) / p / w);
    };
    // Tip 1: fewer weeks
    if (weeks > 2) {
      var pm1 = calcPmpw(value, weeks-1, people, ohp);
      if (pm1 > pmpw + 30) tips.push('💡 1 week shorter → <strong style="color:#22c55e;">£'+pm1+'/pmpw</strong>');
    }
    // Tip 2: one more person
    if (people < 12) {
      var pm2 = calcPmpw(value, weeks, people+1, ohp);
      if (pm2 < pmpw - 30) tips.push('⚠ 1 extra person → <strong style="color:#f59e0b;">£'+pm2+'/pmpw</strong> (thinner margin)');
    }
    // Tip 3: one fewer person
    if (people > 1) {
      var pm3 = calcPmpw(value, weeks, people-1, ohp);
      if (pm3 > pmpw + 50) tips.push('💡 1 fewer person → <strong style="color:#22c55e;">£'+pm3+'/pmpw</strong>');
    }
    // Tip 4: pmpw verdict
    if (pmpw < 500) tips.push('🔴 Below £500/pmpw — negotiate harder or reduce gang size');
    else if (pmpw >= 800) tips.push('🟢 Strong margin — lock this in');

    el.innerHTML = tips.length
      ? '<div style="padding:8px 10px;background:var(--surface2);border-radius:8px;border-left:3px solid #f59e0b;line-height:1.8;">' + tips.join('<br>') + '</div>'
      : '';
  }

  // ── Feature 6: Smart slot finder ───────────────────────────────────────────
  window.dpFindSlot = function() {
    var weeksNeeded  = parseInt((document.getElementById('dp-find-weeks') ||{}).value)||0;
    var peopleNeeded = parseInt((document.getElementById('dp-find-people')||{}).value)||0;
    var el = document.getElementById('dp-find-result');
    if (!el) return;
    if (!weeksNeeded || !peopleNeeded) { el.innerHTML = '<div style="color:#ef4444;font-size:12px;">Enter weeks and people first.</div>'; return; }

    // Build staffByWeek from current jobs
    var TL_PAST_WKS   = 16;
    var TL_FUT_WKS    = 104;
    var TL_TOTAL_WKS  = TL_PAST_WKS + TL_FUT_WKS;
    var TL_AVAIL_STAFF = (function(){ var v = parseInt(localStorage.getItem('dgc_avail_staff')); return (v > 0 && v < 100) ? v : 10; })(); // v1000: editable gang ceiling
    var staffByWeek   = [];
    for (var i=0; i<TL_TOTAL_WKS; i++) staffByWeek[i] = 0;
    loadJobs().filter(function(j){ return j.onTimeline !== false; }).forEach(function(j) {
      var sw = j.startWeek||0;
      var wS = sw + TL_PAST_WKS;
      var wE = wS + (j.weeks||1);
      for (var w=Math.max(0,wS); w<Math.min(TL_TOTAL_WKS,wE); w++) staffByWeek[w] += (j.people||0);
    });

    // Scan for best slot starting from today
    var refDate = new Date();
    var msW = 7*24*60*60*1000;
    var bestSlot = null;
    var futStart = TL_PAST_WKS;
    for (var fs = futStart; fs <= TL_TOTAL_WKS - weeksNeeded; fs++) {
      var fits = true;
      for (var fw = fs; fw < fs + weeksNeeded; fw++) {
        if (staffByWeek[fw] + peopleNeeded > TL_AVAIL_STAFF) { fits = false; break; }
      }
      if (fits) { bestSlot = fs; break; }
    }

    if (bestSlot === null) {
      el.innerHTML = '<div style="padding:12px;border-radius:10px;background:rgba(239,68,68,0.08);border:1px solid #ef444433;font-size:12px;color:#ef4444;">No gap found in the next 2 years with '+peopleNeeded+' people free for '+weeksNeeded+' consecutive weeks. Consider hiring or staggering contracts.</div>';
      return;
    }

    var startDate = new Date(refDate.getTime() + (bestSlot - TL_PAST_WKS) * msW);
    var endDate   = new Date(startDate.getTime() + weeksNeeded * msW);
    var fmtD      = function(d){ return d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}); };
    var weeksAway = bestSlot - TL_PAST_WKS;
    var altSlots  = [];
    for (var as2 = bestSlot + 1; as2 <= TL_TOTAL_WKS - weeksNeeded && altSlots.length < 2; as2++) {
      var fitsAlt = true;
      for (var aw = as2; aw < as2 + weeksNeeded; aw++) {
        if (staffByWeek[aw] + peopleNeeded > TL_AVAIL_STAFF) { fitsAlt = false; break; }
      }
      if (fitsAlt) {
        var altDate = new Date(refDate.getTime() + (as2 - TL_PAST_WKS) * msW);
        altSlots.push(fmtD(altDate));
      }
    }

    el.innerHTML =
      '<div style="padding:14px;border-radius:10px;background:rgba(34,197,94,0.07);border:1px solid #22c55e33;margin-bottom:8px;">'
      + '<div style="font-size:13px;font-weight:800;color:#22c55e;margin-bottom:6px;">✅ Best slot found</div>'
      + '<div style="font-size:20px;font-weight:900;color:var(--text);">'+fmtD(startDate)+' → '+fmtD(endDate)+'</div>'
      + '<div style="font-size:12px;color:var(--muted);margin-top:4px;">'+(weeksAway===0?'Could start immediately':weeksAway+' weeks from now')+' · '+weeksNeeded+' weeks · '+peopleNeeded+' people</div>'
      + '</div>'
      + (altSlots.length ? '<div style="font-size:11px;color:var(--muted);">Other options: '+altSlots.join(' or ')+'</div>' : '');
  };

  // ── Features 7 & 8: Job archive / Actual vs Predicted ────────────────────
  function loadJobHistory() {
    try { var s=localStorage.getItem('dgc_job_history'); return s?JSON.parse(s):[]; } catch(e){return [];}
  }
  function saveJobHistory(h) { try{localStorage.setItem('dgc_job_history',JSON.stringify(h));}catch(e){} }

  window.djArchiveJob = function(idx) {
    var jobs = loadJobs(); if (!jobs[idx]) return;
    var job = jobs[idx];
    var actualProfit = parseFloat(prompt('Actual profit on this job? (£)\nPredicted: £'+Math.round(jobProfit(job)).toLocaleString('en-GB'),'')) || null;
    var actualWeeks  = parseFloat(prompt('Actual weeks on site?\nPlanned: '+job.weeks,'')) || null;
    var actualPeople = parseInt(prompt('Actual people used?\nPlanned: '+job.people,'')) || null;

    var history = loadJobHistory();
    var pred    = jobProfit(job);
    var predPmpw = (job.people>0&&job.weeks>0) ? Math.round((pred + job.people*AVG_WAGE_MARGIN_PW*job.weeks)/job.people/job.weeks) : 0;
    var actPmpw  = (actualProfit && actualPeople && actualWeeks) ?
      Math.round((actualProfit + actualPeople*AVG_WAGE_MARGIN_PW*actualWeeks)/actualPeople/actualWeeks) : null;

    history.push({
      id:         job.id || Date.now(),
      name:       job.name,
      value:      job.value,
      archivedAt: new Date().toISOString().slice(0,10),
      predicted:  { profit: pred,         weeks: job.weeks,  people: job.people,  pmpw: predPmpw },
      actual:     { profit: actualProfit,  weeks: actualWeeks, people: actualPeople, pmpw: actPmpw }
    });
    saveJobHistory(history);

    // Remove from active jobs
    jobs.splice(idx, 1);
    saveJobs(jobs);
    djRenderJobs();
    dpRenderTimeline();
    alert('Job archived. View history in the Completed jobs section.');
  };

  // ── Feature 9: Historical pmpw view ───────────────────────────────────────
  function djRenderHistory() {

      return;
    }
    var avgActualPmpw = 0; var count = 0;
    history.forEach(function(h){ if(h.actual&&h.actual.pmpw){avgActualPmpw+=h.actual.pmpw;count++;} });
    avgActualPmpw = count ? Math.round(avgActualPmpw/count) : 0;
    var avgCol = avgActualPmpw >= 700 ? '#22c55e' : avgActualPmpw >= 500 ? '#f59e0b' : '#ef4444';

    var rows = history.slice().reverse().map(function(h) {
      var predCol = h.predicted.pmpw >= 700 ? '#22c55e' : h.predicted.pmpw >= 500 ? '#f59e0b' : '#ef4444';

        +'<td style="padding:7px 10px;font-weight:800;color:'+predCol+';font-size:12px;">£'+h.predicted.pmpw+'/pw</td>'
        +'<td style="padding:7px 10px;font-weight:800;color:'+actCol+';font-size:12px;">'+(h.actual.pmpw?'£'+h.actual.pmpw+'/pw':'—')+'</td>'

      +'<tbody>'+rows+'</tbody></table></div>';
  }

  // ── Multi-job portfolio ────────────────────────────────────────────────────
  // Profit for a job = user-entered if set, otherwise calculated from value × OH&P%
  function jobProfit(job) {
    if (job.profit && job.profit > 0) return job.profit;
    return (job.value||0) * (job.ohp/100) / (1 + job.ohp/100);
  }

  window.dirRenderJobs = function() {
    var listEl  = document.getElementById('dir-jobs-list');
    var totalEl = document.getElementById('dir-jobs-total');
    if (!listEl) return;
    var jobs = loadJobs();

    if (!jobs.length) {
      listEl.innerHTML = '<div style="text-align:center;padding:20px;color:var(--muted);font-size:13px;">No jobs added yet. Click "+ Add a job" above.</div>';
      if (totalEl) totalEl.innerHTML = ''; return;
    }

    listEl.innerHTML = jobs.map(function(job, idx) {
      var profit   = jobProfit(job);
      var profitWk = job.weeks > 0 ? profit / job.weeks : 0;
      var col      = profit > 50000 ? '#22c55e' : profit > 20000 ? '#f59e0b' : '#ef4444';
      var calcProfit = (job.value||0) * (job.ohp/100) / (1 + job.ohp/100);
      var msPerWeek = 7*24*60*60*1000;
      var today = new Date();
      var startDate = new Date(today.getTime() + (job.startWeek||0) * msPerWeek);
      var endDate   = new Date(startDate.getTime() + (job.weeks||1) * msPerWeek);
      var fmtD = function(d){ return d.toLocaleDateString('en-GB',{day:'numeric',month:'short'}); };
      var dateLabel = fmtD(startDate) + ' → ' + fmtD(endDate);
      return '<div style="border:1px solid var(--border);border-left:4px solid '+col+';border-radius:10px;padding:16px;margin-bottom:10px;">'
        // Header row
        + '<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:12px;">'

        + '<div style="font-size:11px;color:var(--muted);margin-top:2px;">📅 '+dateLabel+'</div>'
        + '</div>'
        + '<div style="display:flex;gap:6px;">'
        + '<button onclick="dirSaveJob('+idx+')" style="padding:5px 12px;background:rgba(34,197,94,0.1);border:1px solid #22c55e44;border-radius:6px;color:#22c55e;font-size:11px;font-weight:700;cursor:pointer;">✓ Save</button>'

        + '<div style="font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);margin-bottom:3px;">Total profit on this job (£)</div>'
        + '<input id="dir-job-pft-'+idx+'" type="number" value="'+(job.profit||'')+'" placeholder="Leave blank to auto-calc from 15%" '
        + 'style="width:100%;padding:7px 10px;border-radius:8px;border:2px solid '+col+'66;font-size:14px;font-weight:900;background:var(--surface2);color:var(--text);">'
        + '<div style="font-size:10px;color:var(--muted);margin-top:3px;">Auto-calc at 15%: '+fmt(calcProfit)+' &nbsp;·&nbsp; Enter your actual figure if different</div>'
        + '</div>'
        + '<div style="display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:8px;background:'+col+'11;border:1px solid '+col+'33;">'
        + '<div>'
        + '<div style="font-size:28px;font-weight:900;color:'+col+';line-height:1;">'+fmt(profit)+'</div>'
        + '<div style="font-size:11px;color:var(--muted);">profit &nbsp;·&nbsp; '+fmt(profitWk)+'/week &nbsp;·&nbsp; '+job.people+' people</div>'
        + '</div>'
        + '</div>'
        + '</div>'
        // Timeline toggle row
        + '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding-top:4px;border-top:1px solid var(--border);margin-top:4px;">'
        + '<label style="display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);cursor:pointer;">'
        + '<input type="checkbox" id="dir-job-tl-'+idx+'" '+(job.onTimeline!==false?'checked':'')+' style="width:14px;height:14px;cursor:pointer;">'
        + 'Show on Job Planner'
        + '</label>'
        + '<label style="display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);cursor:pointer;">'
        + '<input type="checkbox" id="dir-job-conf-'+idx+'" '+(job.confirmed?'checked':'')+' style="width:14px;height:14px;cursor:pointer;">'
        + 'Confirmed (green bar)'
        + '</label>'
        + '<div style="display:flex;align-items:center;gap:4px;font-size:11px;color:var(--muted);">'
        + 'Start week: <input type="number" id="dir-job-sw-'+idx+'" value="'+(job.startWeek||0)+'" style="width:64px;padding:3px 6px;border-radius:6px;border:1px solid var(--border);font-size:11px;background:var(--surface2);color:var(--text);" title="Weeks from today. Negative = past.">'
        + '<span style="font-size:10px;color:var(--muted);">(neg=past)</span>'
        + '</div>'
        + '</div>'
        + '<div style="margin-top:10px;">'
        + '<input id="dir-job-note-'+idx+'" type="text" value="'+(job.note||'')+'" placeholder="Status note — e.g. Week 3 of 17, drainage complete" style="width:100%;padding:6px 10px;border-radius:8px;border:1px dashed var(--border);font-size:12px;color:var(--muted);background:var(--surface2);">'
        + '</div>'
        + '</div>';
    }).join('');

    // Combined totals
    function weeksRemaining(j) {
      var sw = j.startWeek||0; var ew = sw + (j.weeks||1);
      if (ew <= 0) return 0; if (sw >= 52) return 0;
      if (sw >= 0) return j.weeks||1;
      return Math.max(0, ew);
    }
    var _dirGangCeil = (function(){ var v=parseInt(localStorage.getItem('dgc_avail_staff')); return (v>0&&v<100)?v:10; })();
    var _dirOvhd     = (function(){ var v=parseInt(localStorage.getItem('dgc_overhead_staff')); return (v>=0&&v<50)?v:2; })();
    var totalProfit  = jobs.reduce(function(s,j){ return s + jobProfit(j); }, 0);
    // People on site RIGHT NOW — only count jobs running this week
    var _msW3 = 7*24*60*60*1000, _now3 = new Date();
    var totalPeople = jobs.reduce(function(s,j){
      var sd = new Date(_now3.getTime() + (j.startWeek||0)*_msW3);
      var ed = new Date(sd.getTime() + (j.weeks||1)*_msW3);
      return (_now3 >= sd && _now3 <= ed) ? s + (j.people||0) : s;
    }, 0);
    // PEAK staff — worst-case week if all pipeline jobs come through
    var peakPeopleDir = 0;
    for (var _pw3 = -16; _pw3 < 104; _pw3++) {
      var _wkS3 = jobs.reduce(function(acc,j3){
        return (_pw3 >= (j3.startWeek||0) && _pw3 < (j3.startWeek||0)+(j3.weeks||1)) ? acc+(j3.people||0) : acc;
      }, 0);
      if (_wkS3 > peakPeopleDir) peakPeopleDir = _wkS3;
    }
    var monthlyOhp = jobs.reduce(function(s,j){
      var wr = weeksRemaining(j);
      if (wr <= 0) return s;
      return s + jobProfit(j) / Math.max(1, j.weeks) * Math.min(4.333, wr * 4.333 / (j.weeks||1));
    }, 0);
    var monthlyNet   = monthlyOhp - MONTHLY_OVERHEAD;
    var peopleLeft   = _dirGangCeil - totalPeople;
    var peakHire     = Math.max(0, peakPeopleDir - _dirGangCeil);
    var netCol       = monthlyNet > 5000 ? '#22c55e' : monthlyNet > 0 ? '#f59e0b' : '#ef4444';

    if (totalEl) totalEl.innerHTML =
    '<div style="border-top:2px solid var(--border);padding-top:16px;margin-top:4px;">'
    + '<div style="font-size:12px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:12px;">Combined — all jobs in the pipeline</div>'
    + '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:10px;margin-bottom:14px;">'
    + dirNum('Total profit all jobs', fmt(totalProfit), 'across every contract in this list')
    + dirNum('Profit per month (avg)', fmt(monthlyOhp), 'spread over the active weeks of each job')
    + dirNum('Overhead per month', fmt(MONTHLY_OVERHEAD), 'fixed — same every month')
    + '<div style="background:var(--surface2);border:2px solid '+netCol+'44;border-radius:10px;padding:14px;text-align:center;">'
    + '<div style="font-size:26px;font-weight:900;color:'+netCol+';line-height:1;margin-bottom:4px;">'+(monthlyNet>=0?'+':'')+fmt(monthlyNet)+'/month</div>'
    + '<div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;">Net monthly result</div>'
    + '<div style="font-size:10px;color:'+netCol+';margin-top:2px;font-weight:700;">'+(monthlyNet>=0?'✓ Profitable':'⚠ Losing money')+' while these run</div>'
    + '</div>'
    + '</div>'
    // Staff on site today
    + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;">'
    + '<div style="padding:12px 14px;border-radius:10px;background:var(--surface2);border:1px solid var(--border);">'
    + '<div style="font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);margin-bottom:6px;">On site right now</div>'
    + '<div style="font-size:28px;font-weight:900;color:'+(totalPeople>_dirGangCeil?'#ef4444':'var(--text)')+';">'+totalPeople+' <span style="font-size:14px;color:var(--muted);font-weight:400;">of '+_dirGangCeil+' gang · '+(_dirGangCeil+_dirOvhd)+' total</span></div>'
    + (peopleLeft > 0 ? '<div style="font-size:11px;color:#22c55e;margin-top:3px;">'+peopleLeft+' people available for more work</div>' : '')
    + (peopleLeft < 0 ? '<div style="font-size:11px;color:#ef4444;margin-top:3px;">Already need '+Math.abs(peopleLeft)+' more people</div>' : '')
    + (peopleLeft === 0 ? '<div style="font-size:11px;color:#f59e0b;margin-top:3px;">Fully deployed right now</div>' : '')
    + '</div>'
    // Peak staff if all pipeline jobs come through
    + '<div style="padding:12px 14px;border-radius:10px;background:'+(peakHire>0?'rgba(239,68,68,0.08)':'rgba(34,197,94,0.06)')+';border:1px solid '+(peakHire>0?'#ef444433':'#22c55e33')+';">'
    + '<div style="font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);margin-bottom:6px;">If all jobs come through — peak</div>'
    + '<div style="font-size:28px;font-weight:900;color:'+(peakHire>0?'#ef4444':'#22c55e')+';">'+peakPeopleDir+' <span style="font-size:14px;color:var(--muted);font-weight:400;">needed</span></div>'
    + (peakHire > 0 ? '<div style="font-size:12px;color:#ef4444;font-weight:800;margin-top:3px;">Need to hire '+peakHire+' more people</div>' : '<div style="font-size:11px;color:#22c55e;margin-top:3px;">Within current team capacity</div>')
    + '</div>'
    + '</div>'
    + (function(){
        var msPerWeek2 = 7*24*60*60*1000;
        var today3 = new Date();
        var maxEndWeek = 0;
        jobs.forEach(function(j){
          if (!j.confirmed) return;
          var ew = (j.startWeek||0) + (j.weeks||1);
          if (ew > maxEndWeek) maxEndWeek = ew;
        });
        var coverageWeeks = Math.max(0, maxEndWeek);
        var coverageDate  = new Date(today3.getTime() + coverageWeeks * msPerWeek2);
        var coverageFmt   = coverageDate.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
        var winByDate     = new Date(coverageDate.getTime() - 8 * msPerWeek2);
        var winByFmt      = winByDate.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
        var pipCol        = coverageWeeks > 12 ? '#22c55e' : coverageWeeks > 6 ? '#f59e0b' : '#ef4444';
        return '<div style="margin-top:10px;padding:12px 14px;border-radius:10px;background:'+pipCol+'11;border:1px solid '+pipCol+'44;font-size:12px;color:var(--text);line-height:1.6;">'
          + '<strong style="color:'+pipCol+';">📅 Confirmed work covers overhead until '+coverageFmt+'</strong>'
          + (coverageWeeks > 0 ? ' ('+coverageWeeks+' weeks)' : '')
          + (coverageWeeks < 52 ? '<br><span style="color:var(--muted);">Win next job by <strong style="color:'+pipCol+';">'+winByFmt+'</strong> to avoid a gap.</span>' : '')
          + '</div>';
      })()
    + '<div style="margin-top:10px;padding:10px 14px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);font-size:12px;color:var(--muted);line-height:1.6;">'
    + '<strong style="color:var(--text);">The overhead is £'+Math.round(ANNUAL_OVERHEAD/1000)+'k/year.</strong> '
    + 'Current contracts generate <strong style="color:'+netCol+';">£'+Math.round(totalProfit/1000)+'k profit</strong> across their lifetimes. '
    + 'For £150k/year take-home after overhead, DGC needs roughly <strong style="color:var(--text);">£2.7m of annual contracts.</strong>'
    + '</div>'
    + '</div>';
  };

  function jobField(label, id, type, val) {

  window.dirSaveJob = function(idx) {
    var jobs = loadJobs();
    if (!jobs[idx]) return;
    var g  = function(id) { var el=document.getElementById(id); return el?el.value:''; };
    var gc = function(id) { var el=document.getElementById(id); return el?el.checked:false; };

    var swVal          = parseInt(g('dir-job-sw-'+idx));

    jobs[idx].value      = parseFloat(g('dir-job-val-'+idx))  || jobs[idx].value;
    jobs[idx].weeks      = parseFloat(g('dir-job-wks-'+idx))  || jobs[idx].weeks;
    jobs[idx].people     = parseInt  (g('dir-job-ppl-'+idx))  || jobs[idx].people;
    jobs[idx].ohp        = parseFloat(g('dir-job-ohp-'+idx)) || jobs[idx].ohp || 15;
    jobs[idx].profit     = profitOverride > 0 ? profitOverride : 0; // 0 = use auto-calc
    jobs[idx].onTimeline = gc('dir-job-tl-'+idx);
    jobs[idx].confirmed  = gc('dir-job-conf-'+idx);
    jobs[idx].startWeek  = isNaN(swVal) ? (jobs[idx].startWeek || 0) : swVal;

    saveJobs(jobs);
    dirRenderJobs();
  };

  window.dirAddJob = function() {
    var jobs = loadJobs();
    jobs.push({ id: Date.now(), name:'New job', value:0, weeks:8, people:3, ohp:15, profit:0, startWeek:0, onTimeline:true, confirmed:false });
    saveJobs(jobs);

      var el = document.getElementById('dir-job-name-'+(jobs.length-1));

  // ── Main calculation ───────────────────────────────────────────────────────
  window.dirCalc = function() {
    var el = document.getElementById('dir-result');
    if (!el) return;

    var value  = parseFloat((document.getElementById('dir-v')   ||{}).value) || 0;
    var weeks  = parseFloat((document.getElementById('dir-w')   ||{}).value) || 0;
    var people = parseInt  ((document.getElementById('dir-p')   ||{}).value) || 0;
    var ohp    = parseFloat((document.getElementById('dir-ohp') ||{}).value) || 15;
    var name   = ((document.getElementById('dir-name')||{}).value || '').trim() || 'This job';

    if (!value || value <= 0 || !weeks || weeks <= 0 || !people || people <= 0) {
      el.innerHTML = '<div style="text-align:center;padding:20px;color:var(--muted);font-size:13px;">Fill in job value, weeks and number of people above ↑</div>';
      return;
    }

    // OH&P profit: the markup embedded in the price
    // e.g. 15% OH&P means prime cost + 15% = price
    // so profit = price × 15/115
    var ohpProfit   = value * (ohp / 100) / (1 + ohp / 100);
    var ohpPerWk    = ohpProfit / weeks;
    var wageMarginWk= people * AVG_WAGE_MARGIN_PW;   // avg £265/person/week wage margin
    var totalPerWk  = ohpPerWk + wageMarginWk;
    var perManWk    = totalPerWk / people;
    var totalProfit = ohpProfit + (wageMarginWk * weeks);
    var monthlyContrib = totalPerWk * 4.333;
    var ohCoverPct  = Math.round(monthlyContrib / MONTHLY_OVERHEAD * 100);

    var verdict, verdictCol, verdictBg;
    if (perManWk >= 800)       { verdict='Excellent job — strong margin'; verdictCol='#22c55e'; verdictBg='rgba(34,197,94,0.08)'; }
    else if (perManWk >= 650)  { verdict='Good job — worth doing';        verdictCol='#22c55e'; verdictBg='rgba(34,197,94,0.06)'; }
    else if (perManWk >= 500)  { verdict='Tight — watch costs carefully'; verdictCol='#f59e0b'; verdictBg='rgba(245,158,11,0.08)'; }
    else if (perManWk >= 300)  { verdict='Thin margin — negotiate harder';verdictCol='#ef4444'; verdictBg='rgba(239,68,68,0.06)'; }
    else                       { verdict='Very thin — consider carefully'; verdictCol='#ef4444'; verdictBg='rgba(239,68,68,0.08)'; }

    // What-if rows for 1 extra person at a time (current ± 2)
    var wiRows = '';
    for (var n = Math.max(1, people-1); n <= people+3; n++) {
      var pmpw2 = (ohpPerWk + n * AVG_WAGE_MARGIN_PW) / n;
      var c2 = clr(pmpw2);
      var tag = n === people ? ' ← you entered this' : '';
      wiRows += '<tr style="border-bottom:1px solid var(--border);">'
        + '<td style="padding:7px 10px;font-weight:'+(n===people?'800':'500')+';">' + n + ' people' + tag + '</td>'
        + '<td style="padding:7px 10px;font-weight:800;color:'+c2+';">' + fmt(pmpw2) + '/person/week</td>'
        + '<td style="padding:7px 10px;font-size:11px;color:var(--muted);">' + fmt(pmpw2*4.333) + '/person/month</td>'
        + '</tr>';
    }

    el.innerHTML =
    // Big verdict
    '<div style="border-radius:12px;padding:20px 24px;background:'+verdictBg+';border:2px solid '+verdictCol+'40;margin-bottom:16px;text-align:center;">'
    + '<div style="font-size:13px;font-weight:700;color:'+verdictCol+';text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px;">'+verdict+'</div>'
    + '<div style="font-size:60px;font-weight:900;color:'+verdictCol+';line-height:1;margin-bottom:4px;">' + fmt(perManWk) + '</div>'
    + '<div style="font-size:14px;color:var(--muted);">per person, per week</div>'
    + '</div>'

    // Three supporting numbers
    + '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:16px;">'
    + dirNum('Total profit this job', fmt(totalProfit), 'OH&P + labour margin combined')
    + dirNum('Profit every week', fmt(totalPerWk), 'across all '+people+' people')
    + dirNum('Per person per month', fmt(perManWk*4.333), 'averaged across the job')
    + '</div>'

    // Plain-English workings
    + '<div style="background:var(--surface2);border-radius:10px;padding:14px 16px;margin-bottom:14px;border-left:4px solid '+verdictCol+';font-size:12px;color:var(--muted);line-height:1.8;">'
    + '<strong style="color:var(--text);">How we work this out:</strong><br>'
    + name + ' is worth <strong style="color:var(--text);">' + fmt(value) + '</strong>. '
    + 'Your ' + ohp + '% profit markup on that = <strong style="color:var(--text);">' + fmt(ohpProfit) + '</strong> OH&P profit over ' + weeks + ' weeks = <strong style="color:var(--text);">' + fmt(ohpPerWk) + '</strong>/week.<br>'
    + 'The ' + people + ' people also earn a wage margin of <strong style="color:var(--text);">' + fmt(wageMarginWk) + '</strong>/week between them (the gap between what they cost you and what you charge for them).<br>'
    + 'Total in: <strong style="color:var(--text);">' + fmt(totalPerWk) + '</strong>/week → divided by ' + people + ' people = <strong style="color:'+verdictCol+';font-weight:800;">' + fmt(perManWk) + '/person/week.</strong>'
    + '</div>'

    // Overhead check
    + '<div style="background:'+(ohCoverPct>=100?'rgba(34,197,94,0.07)':ohCoverPct>=60?'rgba(245,158,11,0.07)':'rgba(239,68,68,0.07)')+';border:1px solid '+(ohCoverPct>=100?'#22c55e40':ohCoverPct>=60?'#f59e0b40':'#ef444440')+';border-radius:10px;padding:12px 16px;margin-bottom:14px;font-size:12px;line-height:1.6;">'
    + '<strong style="color:var(--text);">Company overhead check:</strong> this job brings in <strong>' + fmt(monthlyContrib) + '/month</strong> toward your £16,297/month fixed costs. '
    + (ohCoverPct >= 100
      ? '<span style="color:#22c55e;font-weight:800;">Covers all overheads with ' + fmt(monthlyContrib-MONTHLY_OVERHEAD) + ' to spare.</span>'
      : '<span style="color:'+(ohCoverPct>=60?'#f59e0b':'#ef4444')+';font-weight:800;">Covers '+ohCoverPct+'% of overheads — you need other jobs running alongside.</span>')
    + '</div>'

    // What-if table
    + '<details>'
    + '<summary style="font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;user-select:none;padding:4px 0;">▸ What if I put more or fewer people on this job?</summary>'
    + '<div style="overflow-x:auto;margin-top:10px;">'
    + '<table style="width:100%;border-collapse:collapse;font-size:12px;">'
    + '<thead><tr style="background:var(--surface2);">'
    + '<th style="padding:7px 10px;text-align:left;color:var(--muted);font-weight:700;font-size:11px;">Team size</th>'
    + '<th style="padding:7px 10px;text-align:left;color:var(--muted);font-weight:700;font-size:11px;">Profit per person per week</th>'
    + '<th style="padding:7px 10px;text-align:left;color:var(--muted);font-weight:700;font-size:11px;">Per person per month</th>'
    + '</tr></thead>'
    + '<tbody>' + wiRows + '</tbody>'
    + '</table>'
    + '<div style="font-size:11px;color:var(--muted);margin-top:8px;padding:8px;background:var(--surface2);border-radius:6px;">'
    + 'Adding more people dilutes the OH&P profit per person but adds more wage margin. The sweet spot is usually the smallest team that can complete the job in the agreed time.'
    + '</div>'
    + '</div>'
    + '</details>';
  };

  function dirNum(label, val, sub) {
    return '<div style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center;">'
    + '<div style="font-size:22px;font-weight:900;color:var(--text);margin-bottom:3px;">' + val + '</div>'

    + '</div>';
  }

  // ── Company health ─────────────────────────────────────────────────────────
  window.dirHealth = function() {
    var el = document.getElementById('dir-health');
    if (!el) return;
    var n   = parseInt((document.getElementById('health-n')||{}).value) || 0;
    var rev = n * PROFIT_PER_MAN_MTH;
    var net = rev - MONTHLY_OVERHEAD;
    var col = net > 5000 ? '#22c55e' : net > 0 ? '#f59e0b' : '#ef4444';
    var barW= Math.min(Math.round(rev/MONTHLY_OVERHEAD*100), 130);

    el.innerHTML =
    // Big net number
    '<div style="border-radius:12px;padding:20px;background:'+(net>0?'rgba(34,197,94,0.07)':'rgba(239,68,68,0.07)')+';border:2px solid '+col+'30;text-align:center;margin-bottom:14px;">'
    + '<div style="font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:0.07em;color:var(--muted);margin-bottom:6px;">'+(net>0?'Monthly profit':'Monthly loss')+'</div>'
    + '<div style="font-size:52px;font-weight:900;color:'+col+';line-height:1;">' + (net>=0?'+':'') + fmt(net) + '</div>'
    + '<div style="font-size:12px;color:var(--muted);margin-top:6px;">with <strong style="color:var(--text);">' + n + '</strong> people on productive work</div>'
    + '</div>'

    + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;">'
    + dirNum('Coming in from work', fmt(rev), n + ' people × £3,216/month')
    + dirNum('Going out fixed costs', fmt(MONTHLY_OVERHEAD), 'overheads — same every month')
    + '</div>'

    // Bar
    + '<div style="font-size:11px;font-weight:700;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.05em;">How much of the fixed costs are covered?</div>'
    + '<div style="background:var(--border);border-radius:6px;height:16px;overflow:hidden;margin-bottom:6px;">'
    + '<div style="width:'+Math.min(barW,100)+'%;background:'+col+';height:100%;border-radius:6px;transition:width 0.3s;"></div>'
    + '</div>'
    + '<div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:14px;">'
    + '<span>£0</span>'

    + '<div style="font-size:12px;color:var(--muted);margin-bottom:8px;"><strong style="color:var(--text);">Key milestones — this is all profit</strong> (money left over after paying all wages and all overheads):</div>'

    + '<th style="padding:6px 10px;text-align:left;font-size:11px;color:var(--muted);font-weight:700;">Annual profit</th>'
    + '</tr></thead>'
    + [5,6,7,8,10,12,15,20,25,30,40].map(function(nn) {
        var r2=nn*PROFIT_PER_MAN_MTH, n2=r2-MONTHLY_OVERHEAD;
        var c2=n2>20000?'#22c55e':n2>5000?'#22c55e':n2>0?'#f59e0b':'#ef4444';
        var isCurrent = nn===n;
        return '<tr style="border-bottom:1px solid var(--border);'+(isCurrent?'background:rgba(245,158,11,0.08);':'')+'">'
          +'<td style="padding:6px 10px;font-weight:'+(isCurrent?'900':'500')+';'+(isCurrent?'color:#f59e0b;':'')+'">'+nn+' people'+(isCurrent?' ← you':'')+'</td>'
          +'<td style="padding:6px 10px;color:'+c2+';font-weight:800;">'+(n2>=0?'+':'')+fmt(n2)+'/month</td>'
          +'<td style="padding:6px 10px;font-size:11px;color:'+(n2>0?'#22c55e':'#ef4444')+';font-weight:700;">'+(function(){if(n2<=0)return'loss';var a=n2*12;if(a>=1000000)return'+£'+(a/1000000).toFixed(2)+'m profit/year';return'+£'+Math.round(a/1000)+'k profit/year';})()+'</td>'
          +'</tr>';
      }).join('')
    + '</table>'
    + '</div>';

    // Draw the chart after HTML is set
    setTimeout(function() {
      var canvas = document.getElementById('dir-growth-chart');
      if (!canvas) return;
      if (window._dirGrowthChart) { try { window._dirGrowthChart.destroy(); } catch(e){} }
      var labels = [], dataVals = [], bgCols = [], borderCols = [];
      var breakEvenN = MONTHLY_OVERHEAD / PROFIT_PER_MAN_MTH; // ~6.14
      for (var i = 1; i <= 40; i++) {
        labels.push(i);
        var v2 = i * PROFIT_PER_MAN_MTH - MONTHLY_OVERHEAD;
        dataVals.push(Math.round(v2));
        var isHighlighted = i === n;
        var col2 = v2 < 0 ? 'rgba(239,68,68,' + (isHighlighted?'0.9':'0.55') + ')'
                          : v2 < 10000 ? 'rgba(245,158,11,' + (isHighlighted?'0.9':'0.6') + ')'
                          : 'rgba(34,197,94,' + (isHighlighted?'0.9':'0.65') + ')';
        bgCols.push(col2);
        borderCols.push(isHighlighted ? '#f59e0b' : 'transparent');
      }
      try {
        window._dirGrowthChart = new Chart(canvas, {
          type: 'bar',
          data: {
            labels: labels,
            datasets: [{
              label: 'Monthly net profit',
              data: dataVals,
              backgroundColor: bgCols,
              borderColor: borderCols,
