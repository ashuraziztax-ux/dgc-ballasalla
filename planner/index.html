            plugins: {
              legend: { display: false },
              tooltip: {
                callbacks: {
                  title: function(ctx) { return ctx[0].label + ' people on productive work'; },
                  label: function(ctx) {
                    var v3 = ctx.raw;
                    return (v3 >= 0 ? '+' : '') + '£' + Math.abs(v3).toLocaleString('en-GB') + '/month' + (v3 < 0 ? ' (loss)' : ' profit');
                  }
                }
              },
              annotation: { annotations: {} }
            },
            scales: {
              x: {
                title: { display: true, text: 'People on productive work', color: '#64748b', font: { size: 11 } },
                grid: { display: false },
                ticks: { color: '#94a3b8', font: { size: 10 },
                  callback: function(val, idx) { return [1,5,10,15,20,25,30,35,40].indexOf(idx+1) >= 0 ? idx+1 : ''; }
                }
              },
              y: {

                grid: { color: 'rgba(148,163,184,0.15)' },
                ticks: {

                }
              }
            }
          }
        });
        // Draw break-even line manually after chart renders
        setTimeout(function() {
          try {
            var ch = window._dirGrowthChart;
            var ctx2 = canvas.getContext('2d');
            var yScale = ch.scales.y;
            var xScale = ch.scales.x;
            var yZero = yScale.getPixelForValue(0);
            ctx2.save();
            ctx2.setLineDash([6, 4]);
            ctx2.strokeStyle = '#f59e0b';
            ctx2.lineWidth = 2;
            ctx2.beginPath();

            ctx2.lineTo(xScale.right, yZero);
            ctx2.stroke();
            ctx2.fillStyle = '#f59e0b';
            ctx2.font = 'bold 10px system-ui';
            ctx2.fillText('Break-even (~7 people)', xScale.left + 4, yZero - 5);
            ctx2.restore();
          } catch(e) {}

      } catch(e) { console.warn('Chart failed:', e); }
    }, 50);

  // ── Benchmark library ──────────────────────────────────────────────────────
  function dirRenderBM() {

    + '<thead><tr style="background:var(--surface2);">'

        return '<th style="padding:7px 10px;text-align:left;font-weight:700;font-size:11px;color:var(--muted);text-transform:uppercase;">'+h+'</th>';
      }).join('')
    + '</tr></thead><tbody>'

          +'<td style="padding:8px 10px;font-weight:700;">'+r.job+'</td>'

          +'<td style="padding:8px 10px;font-size:11px;color:var(--muted);">'+r.notes+'</td>'
          +'<td style="padding:8px 10px;">'+(i>1?'<button onclick="dirRemoveBM('+i+')" style="background:none;border:none;color:#ef4444;cursor:pointer;font-size:13px;">✕</button>':'')+'</td>'
          +'</tr>';
      }).join('')
    + '</tbody></table></div>';
  }

  window.dirRemoveBM = function(i) {
    var rows = loadBM() || defaultBM();
    rows.splice(i,1); saveBM(rows); dirRenderBM();
  };

  window.dirSaveCurrent = function() {
    var value  = parseFloat((document.getElementById('dir-v')  ||{}).value)||0;
    var weeks  = parseFloat((document.getElementById('dir-w')  ||{}).value)||0;
    var people = parseInt  ((document.getElementById('dir-p')  ||{}).value)||0;
    var ohp    = parseFloat((document.getElementById('dir-ohp')||{}).value)||15;
    var name   = ((document.getElementById('dir-name')||{}).value||'').trim()||'Unnamed job';
    if (!value||value<=0||!weeks||weeks<=0||!people||people<=0) { alert('Fill in the calculator first.'); return; }
    var ohpProfit = value*(ohp/100)/(1+ohp/100);
    var totalPW   = ohpProfit/weeks + people*AVG_WAGE_MARGIN_PW;
    var pmpw      = Math.round(totalPW/people);
    var rows = loadBM()||defaultBM();
    rows.push({job:name, type:'Added', weeks:weeks, people:people, pmpw:pmpw, notes:'Saved '+new Date().toLocaleDateString('en-GB')});
    saveBM(rows); dirRenderBM();
  };

  // ── Job Timeline / Gantt Planner ───────────────────────────────────────────
  window.dirRenderTimeline = function(containerId) {
    var inner = document.getElementById(containerId || 'dir-timeline-inner');
    if (!inner) return;

    // Constants
    var TL_WEEK_W    = 36;   // wider columns = more readable
    var TL_ROW_H     = 42;
    var TL_HDR_H     = 28;
    var TL_PAD_TOP   = TL_HDR_H + 8;
    var TL_STAFF_H   = 54;
    var TL_PL_H      = 44;  // taller P&L row so £ amounts are readable
    var TL_PAST_WKS  = 16;
    var TL_FUT_WKS   = 104;
    var TL_TOTAL_WKS = TL_PAST_WKS + TL_FUT_WKS;
    var TL_TOTAL_W   = TL_TOTAL_WKS * TL_WEEK_W;
    var TL_TODAY_X   = TL_PAST_WKS * TL_WEEK_W;
    var TL_AVAIL_STAFF = (function(){ var v = parseInt(localStorage.getItem('dgc_avail_staff')); return (v > 0 && v < 100) ? v : 10; })(); // v1000: editable gang ceiling
    var MONTHLY_OVERHEAD_LOSS = 16297;

    var allJobsRaw = loadJobs();
    var jobs = allJobsRaw.filter(function(j){ return j.onTimeline !== false; });
    var hiddenCount = allJobsRaw.length - jobs.length;

    // Count bar — placed OUTSIDE the scrollable container (before the scroll wrapper)
    // Using a fixed ID so it's always cleanly replaced, never accumulates
    var cbId = 'tl-count-bar-' + (inner.id || 'tl');
    var scrollWrap = inner.parentElement; // dp-tl-wrap (the scrollable div)
    var countBarHost = scrollWrap ? scrollWrap.parentElement : null; // card div — outside scroll
    var existingCb = document.getElementById(cbId);
    if (existingCb) { try { existingCb.parentElement.removeChild(existingCb); } catch(e2) {} }
    if (countBarHost && scrollWrap) {
      var countBar = document.createElement('div');
      countBar.id = cbId;
      if (hiddenCount > 0) {
        countBar.style.cssText = 'padding:8px 12px;background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.3);border-radius:8px;font-size:12px;color:#f59e0b;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:8px;';
        countBar.innerHTML = '<span><strong>' + jobs.length + ' job' + (jobs.length!==1?'s':'') + ' on planner</strong> · ' + hiddenCount + ' hidden</span>'
          + '<button onclick="(function(){var jbs=window._loadJobsForShowAll?window._loadJobsForShowAll():[];jbs.forEach(function(j){j.onTimeline=true;});try{localStorage.setItem(\'dgc_jobs\',JSON.stringify(jbs));buildDirPlannerTab();}catch(e){}})()" style="padding:4px 10px;background:#f59e0b;border:none;border-radius:6px;color:#1a1d27;font-size:11px;font-weight:800;cursor:pointer;">Show all</button>';
      } else {
        countBar.style.cssText = 'padding:6px 12px;background:rgba(34,197,94,0.07);border:1px solid rgba(34,197,94,0.2);border-radius:8px;font-size:12px;color:#22c55e;margin-bottom:8px;';
        countBar.innerHTML = '✓ <strong>' + jobs.length + ' job' + (jobs.length!==1?'s':'') + '</strong> on planner — all showing';
      }
      countBarHost.insertBefore(countBar, scrollWrap); // insert BEFORE the scroll container, not inside it
    }
    window._loadJobsForShowAll = loadJobs;
    var tlJobs = []; // shallow copies with barX/barW
    jobs.forEach(function(j, i) {
      var sw  = (j.startWeek !== undefined) ? j.startWeek : 0;
      var barX = TL_TODAY_X + sw * TL_WEEK_W;
      var barW = Math.max(1, (j.weeks || 1)) * TL_WEEK_W;
      tlJobs.push({ job:j, idx:i, barX:barX, barW:barW, sw:sw });
    });

    var svgH = TL_PAD_TOP + tlJobs.length * TL_ROW_H + 16 + TL_STAFF_H + TL_PL_H + 24;

    // ── Build staff tally per week ──
    var staffByWeek = []; // index = 0..TL_TOTAL_WKS-1 (week relative to start of timeline = today - TL_PAST_WKS)
    for (var w = 0; w < TL_TOTAL_WKS; w++) staffByWeek[w] = 0;
    tlJobs.forEach(function(tl) {
      var wStart = Math.round(tl.sw) + TL_PAST_WKS; // offset from timeline start
      var wEnd   = wStart + (tl.job.weeks || 1);
      for (var w2 = Math.max(0, wStart); w2 < Math.min(TL_TOTAL_WKS, wEnd); w2++) {
        staffByWeek[w2] += (tl.job.people || 0);
      }
    });

    // ── Build profit contribution per week ──
    var profitByWeek = [];
    for (var wp = 0; wp < TL_TOTAL_WKS; wp++) profitByWeek[wp] = 0;
    tlJobs.forEach(function(tl) {
      var wpStart = Math.round(tl.sw) + TL_PAST_WKS;
      var wpEnd   = wpStart + (tl.job.weeks || 1);
      var ohpPerWk = jobProfit(tl.job) / Math.max(1, tl.job.weeks);
      var wageWk   = (tl.job.people || 0) * AVG_WAGE_MARGIN_PW;
      for (var wp2 = Math.max(0, wpStart); wp2 < Math.min(TL_TOTAL_WKS, wpEnd); wp2++) {
        profitByWeek[wp2] += ohpPerWk + wageWk;
      }
    });
    var OVERHEAD_PER_WEEK = MONTHLY_OVERHEAD / 4.333; // ~£3,759

    // ── Identify gap weeks in future 52 weeks ──
    var gapRanges = []; // [{start, end}] in timeline-week coords (0-based from timeline start)
    var futStart = TL_PAST_WKS; // timeline index of "today"
    var inGap = false, gapStart = 0;
    for (var wf = futStart; wf < futStart + 52; wf++) {
      if (staffByWeek[wf] === 0) {
        if (!inGap) { inGap = true; gapStart = wf; }
      } else {
        if (inGap) { gapRanges.push({start:gapStart, end:wf}); inGap = false; }
      }
    }
    if (inGap) gapRanges.push({start:gapStart, end:futStart+52});

    // ── SVG string builder ──
    var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="'+TL_TOTAL_W+'" height="'+svgH+'" style="display:block;font-family:system-ui,sans-serif;cursor:default;" id="dir-tl-svg">';

    // Background
    svg += '<rect width="'+TL_TOTAL_W+'" height="'+svgH+'" fill="var(--surface,#f8fafc)" rx="0"/>';

    // ── Month header ──
    var refDate = new Date();
    refDate.setHours(0,0,0,0);
    // Step back to monday of this week
    var dow = refDate.getDay(); // 0=sun
    refDate.setDate(refDate.getDate() - ((dow+6)%7));
    // Go back TL_PAST_WKS weeks
    refDate.setDate(refDate.getDate() - TL_PAST_WKS * 7);
    var lastMonth = -1;
    for (var mw = 0; mw < TL_TOTAL_WKS; mw++) {
      var d = new Date(refDate); d.setDate(d.getDate() + mw*7);
      var mo = d.getMonth();
      if (mo !== lastMonth) {
        lastMonth = mo;
        var label = d.toLocaleString('en-GB',{month:'short',year:'numeric'});
        var lx = mw * TL_WEEK_W + 4;
        svg += '<text x="'+lx+'" y="18" font-size="10" font-weight="700" fill="#64748b">'+label+'</text>';
        if (mw > 0) svg += '<line x1="'+(mw*TL_WEEK_W)+'" y1="0" x2="'+(mw*TL_WEEK_W)+'" y2="'+svgH+'" stroke="#e2e8f0" stroke-width="1"/>';
      }
    }

    // ── Alternating week bands (subtle) ──
    for (var wb = 0; wb < TL_TOTAL_WKS; wb++) {
      if (wb % 2 === 0) {
        svg += '<rect x="'+(wb*TL_WEEK_W)+'" y="'+TL_HDR_H+'" width="'+TL_WEEK_W+'" height="'+(svgH-TL_HDR_H)+'" fill="rgba(0,0,0,0.015)"/>';
      }
    }

    // ── Gap zones ──
    gapRanges.forEach(function(gr) {
      var gx = gr.start * TL_WEEK_W;
      var gw = (gr.end - gr.start) * TL_WEEK_W;
      var gapWeeks = gr.end - gr.start;
      var gapMonthLoss = Math.round(MONTHLY_OVERHEAD_LOSS * gapWeeks / 4.333);
      svg += '<rect x="'+gx+'" y="'+TL_HDR_H+'" width="'+gw+'" height="'+(svgH-TL_HDR_H)+'" fill="rgba(239,68,68,0.07)" stroke="rgba(239,68,68,0.25)" stroke-width="1"/>';
      if (gapWeeks >= 2) {
        var lossLabel = gapWeeks >= 4 ? '-£'+Math.round(gapMonthLoss/1000)+'k gap' : 'gap';
        svg += '<text x="'+(gx+4)+'" y="'+(TL_HDR_H+14)+'" font-size="9" fill="#ef4444" font-weight="700">'+lossLabel+'</text>';
      }
    });

    // ── Today line ──
    svg += '<line x1="'+TL_TODAY_X+'" y1="0" x2="'+TL_TODAY_X+'" y2="'+svgH+'" stroke="#f59e0b" stroke-width="2" stroke-dasharray="5,4"/>';
    svg += '<text x="'+(TL_TODAY_X+4)+'" y="'+(TL_HDR_H-6)+'" font-size="9" fill="#f59e0b" font-weight="800">TODAY</text>';

    // ── Job bars ──
    tlJobs.forEach(function(tl, i) {
      var bx = tl.barX;
      var bw = tl.barW;
      var by = TL_PAD_TOP + i * TL_ROW_H;
      var bh = TL_ROW_H - 6;
      var statusColors = {
        'running':          { fill:'#22c55e', opacity:'0.90' },
        'awarded':          { fill:'#3b82f6', opacity:'0.85' },
        'confirmed':        { fill:'#10b981', opacity:'0.88' },
        'tendering_likely': { fill:'#f97316', opacity:'0.82' },
        'tendering':        { fill:'#f59e0b', opacity:'0.78' },
        'placeholder':      { fill:'#94a3b8', opacity:'0.45' }
      };
      var jobStatus = tl.job.status || (tl.job.confirmed ? 'running' : 'tendering');
      var sc2 = statusColors[jobStatus] || statusColors['tendering'];
      var fillColor = sc2.fill;
      var fillOpacity = sc2.opacity;
      var msPerWeek = 7*24*60*60*1000;
      var today2 = new Date();
      var barStart = new Date(today2.getTime() + tl.sw * msPerWeek);
      var barEnd   = new Date(barStart.getTime() + (tl.job.weeks||1) * msPerWeek);
      var fmtD2 = function(d){ return d.toLocaleDateString('en-GB',{day:'numeric',month:'short'}); };
      var label = (tl.job.name || 'Job') + ' · ends ' + fmtD2(barEnd);

      svg += '<rect x="'+bx+'" y="'+by+'" width="'+bw+'" height="'+bh+'" rx="6" fill="'+fillColor+'" fill-opacity="'+fillOpacity+'" stroke="'+fillColor+'" stroke-width="1" stroke-opacity="0.5"'
           + ' data-job-sw="'+tl.sw+'" data-job-wks="'+(tl.job.weeks||1)+'" data-job-tl-idx="'+i+'"'
           + ' style="cursor:ew-resize;" class="tl-bar"/>';
      // Clip label text inside bar
      var maxChars = Math.max(0, Math.floor(bw / 7) - 2);
      var displayLabel = label.length > maxChars ? label.substring(0, maxChars) + '…' : label;
      if (bw > 30) {
        svg += '<text x="'+(bx+8)+'" y="'+(by+bh/2+4)+'" font-size="11" font-weight="700" fill="white" fill-opacity="0.95" pointer-events="none">'+displayLabel+'</text>';
      }
      // Staff count badge (circle at right end of bar)
      if (bw > 20) {
        var bxr = Math.max(bx + 20, bx + bw - 16);
        var byc = by + bh / 2;
        svg += '<circle cx="'+bxr+'" cy="'+byc+'" r="10" fill="rgba(0,0,0,0.3)" pointer-events="none"/>';
        svg += '<text x="'+bxr+'" y="'+(byc+4)+'" font-size="10" font-weight="900" fill="white" text-anchor="middle" pointer-events="none">'+(tl.job.people||0)+'</text>';
      }
    });

    // ── Staff tally section ──
    var staffY = TL_PAD_TOP + tlJobs.length * TL_ROW_H + 16;
    var maxStaff = Math.max(TL_AVAIL_STAFF, Math.max.apply(null, staffByWeek.concat([1])));
    var staffScale = (TL_STAFF_H - 14) / maxStaff;
    var plY = staffY + TL_STAFF_H; // P&L row starts here

    svg += '<rect x="0" y="'+(staffY-4)+'" width="'+TL_TOTAL_W+'" height="'+(TL_STAFF_H+TL_PL_H+8)+'" fill="#0f1623"/>';
    svg += '<text x="4" y="'+(staffY+10)+'" font-size="9" fill="#94a3b8" font-weight="700" letter-spacing="0.08em">STAFF / WEEK</text>';
    svg += '<text x="4" y="'+(plY+18)+'" font-size="9" fill="#94a3b8" font-weight="700" letter-spacing="0.08em">WEEKLY P&amp;L</text>';

    // Available staff line
    var availY = staffY + TL_STAFF_H - Math.round(TL_AVAIL_STAFF * staffScale) - 2;
    svg += '<line x1="0" y1="'+availY+'" x2="'+TL_TOTAL_W+'" y2="'+availY+'" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3"/>';
    svg += '<text x="4" y="'+(availY-3)+'" font-size="9" fill="#f59e0b" font-weight="800">'+TL_AVAIL_STAFF+' available</text>';

    // Divider between staff and P&L rows
    svg += '<line x1="0" y1="'+plY+'" x2="'+TL_TOTAL_W+'" y2="'+plY+'" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>';

    for (var ws = 0; ws < TL_TOTAL_WKS; ws++) {
      var sc = staffByWeek[ws];
      var weekProfit = profitByWeek[ws] - OVERHEAD_PER_WEEK;
      var sx = ws * TL_WEEK_W + 1;

      // Staff bar
      if (sc > 0) {
        var barH2 = Math.max(4, Math.round(sc * staffScale));
        var sy2 = staffY + TL_STAFF_H - barH2 - 2;
        var sColor = sc > TL_AVAIL_STAFF ? '#ef4444' : '#22c55e';
        svg += '<rect x="'+sx+'" y="'+sy2+'" width="'+(TL_WEEK_W-2)+'" height="'+barH2+'" fill="'+sColor+'" fill-opacity="1" rx="2"/>';
        // Count number above bar
        svg += '<text x="'+(sx+TL_WEEK_W/2-1)+'" y="'+(sy2-3)+'" font-size="11" font-weight="900" text-anchor="middle" fill="'+sColor+'">'+sc+'</text>';
        // Overflow warning
        if (sc > TL_AVAIL_STAFF) {

    function drRenderLookahead() {

      // Calculate total days
      var totalDays = items.reduce(function(s, item) {
        var rate = SIMON_RATES.find(function(r){ return r.id === item.actId; });
        if (!rate || !item.qty) return s;

      var pct = Math.round(totalDays / available * 100);
      var col = pct <= 85 ? '#22c55e' : pct <= 100 ? '#f59e0b' : '#ef4444';
      var verdict = pct <= 85 ? '✅ Achievable — you have headroom'
        : pct <= 100 ? '⚠️ Tight — achievable if nothing goes wrong'
        : pct <= 130 ? '🔴 Over-ambitious — '+Math.round(totalDays-available)+' days over'

      // Morning verdict: is the planned qty achievable in 1 day?
      var pct = Math.round(qty / rate.output * 100);
      var vCol = pct <= 90 ? '#22c55e' : pct <= 110 ? '#f59e0b' : '#ef4444';
      var vTxt = pct <= 90 ? 'Achievable — '+qty+' '+rate.unit+' is '+pct+'% of a full day\'s output'
               : pct <= 110 ? 'Tight — that\'s '+pct+'% of Simon\'s daily output. Needs a clean run.'

                var conf = a.logs < 3 ? '('+a.logs+' log'+(a.logs===1?'':'s')+')' : '('+a.logs+' logs)';
                return '<div style="display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid var(--border);font-size:11px;">'
                  +'<span style="color:var(--muted);">'+a.name+'</span>'
                  +'<span style="font-weight:700;color:'+col+';">'+(avg!==null?avg+'%':'—')+' <span style="color:var(--muted);font-weight:400;">'+conf+'</span></span>'
                  +'</div>';
              }).join('')
            : '<div style="font-size:11px;color:var(--muted);padding:4px 0;">No activity data yet</div>';

          return '<div style="border:1px solid var(--border);border-radius:10px;padding:14px;'+(noData?'opacity:0.6;':'')+'">'
            + '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;">'
            +   '<div style="font-size:13px;font-weight:800;color:var(--text);">'+name+'</div>'
            +   '<div style="font-size:10px;color:var(--muted);">'+s.logs+' log'+(s.logs===1?'':'s')+'</div>'
            + '</div>'
            + actRows
            + (s.gangPartners.length ? '<div style="font-size:10px;color:var(--muted);margin-top:6px;">Works with: '+s.gangPartners.slice(0,3).join(', ')+(s.gangPartners.length>3?' +more':'')+' </div>' : '')
            + (noData ? '<div style="font-size:10px;color:#f59e0b;margin-top:4px;">⚠ No data yet</div>' : '')
            + (alwaysSame ? '<div style="font-size:10px;color:#38bdf8;margin-top:4px;">💡 Always same gang — try rotating</div>' : '')
            + '</div>';
        }).join('');

        var suggestions = [];
        STAFF.forEach(function(name) {
          if (!staffStats[name] || staffStats[name].logs === 0) {
            suggestions.push({ type:'nodata', person:name, text:'No logs for '+name+' yet — make sure they\'re being included in daily logs.', col:'#94a3b8' });
          }
        });
        STAFF.forEach(function(name) {
          var s = staffStats[name];
          if (!s || s.logs < 3) return;
          if (s.gangPartners.length <= 1) {
            suggestions.push({ type:'rotate', person:name, text:'Try varying the gang that includes '+name+' to build comparison data and find the best combination for each activity.', col:'#38bdf8' });
          }
        });
        var keyActivities = ['d150-150','d150-175','mh1200-175','kerb-bullnose'];
        keyActivities.forEach(function(actId) {
          var simon = SIMON.find(function(s){return s.id===actId;});
          var hasData = logs.some(function(l){return (l.teams||[]).some(function(t){return t.actId===actId;});});
          if (!hasData && simon) {
            suggestions.push({ type:'activity', text:'No data on '+simon.name+' yet. When this activity runs, log it to build the benchmark.', col:'#f59e0b' });
          }
        });

        return '<div class="card" style="border-radius:12px;margin-bottom:14px;padding:18px;">'
          + '<div style="font-size:14px;font-weight:800;color:var(--text);margin-bottom:4px;">👷 Staff performance</div>'
          + '<div style="font-size:12px;color:var(--muted);margin-bottom:14px;">How each operative is performing vs Simon\'s benchmark rates. Based on daily logs — confidence grows as more entries are added. Blocked days (third-party delays) excluded from scores.</div>'
          + '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px;">'
          + staffCards
          + '</div>'
          + '</div>'
          + '<div class="card" style="border-radius:12px;margin-bottom:14px;padding:18px;">'
          + '<div style="font-size:14px;font-weight:800;color:var(--text);margin-bottom:4px;">🔗 Gang combinations</div>'
          + '<div style="font-size:12px;color:var(--muted);margin-bottom:14px;">Which pairs of operatives produce the best results? Builds from daily logs as data accumulates. More logs = more reliable picture.</div>'
          + buildPairingMatrix()
          + '</div>'
          + (function() {
              var actionSugs = suggestions.filter(function(s){ return s.type !== 'nodata'; });
              var dataSugs   = suggestions.filter(function(s){ return s.type === 'nodata'; });
              return '<div class="card" style="border-radius:12px;margin-bottom:14px;padding:18px;">'
                + '<div style="font-size:14px;font-weight:800;color:var(--text);margin-bottom:4px;">💡 Suggestions</div>'
                + '<div style="font-size:12px;color:var(--muted);margin-bottom:14px;">System-generated recommendations based on the data. Act on these to improve gang planning and build more useful performance data over time.</div>'
                + (actionSugs.length
                  ? actionSugs.map(function(s){
                      return '<div style="padding:10px 14px;border-radius:8px;border-left:3px solid '+s.col+';background:'+s.col+'08;margin-bottom:8px;font-size:12px;color:var(--text);">'+s.text+'</div>';
                    }).join('')
                  : '<div style="font-size:12px;color:var(--muted);padding:8px 0;">No action items yet.</div>'
                )
                + (dataSugs.length
                  ? '<details style="margin-top:8px;"><summary style="font-size:11px;color:var(--muted);cursor:pointer;">'+dataSugs.length+' operative'+(dataSugs.length>1?'s':'')+' with no logs yet</summary>'
                    + '<div style="margin-top:6px;">'
                    + dataSugs.map(function(s){ return '<div style="padding:6px 10px;font-size:11px;color:var(--muted);">'+s.text+'</div>'; }).join('')
                    + '</div></details>'
                  : ''
                )
                + '</div>';
            })();
      })()

    + '</div>';

    el.innerHTML = html;
  };

  // ── Seed Gang Intelligence with logs from digitised paper forms (29 May + 21 Jun 2026) ──
  (function() {
    try {
      if (localStorage.getItem('dgc_gang_logs')) return; // already has data
      var seedLogs = [
        {
          date:'2026-06-21', foreman:'James Cosgrove', sm:'James Cosgrove', weather:'Sunny',
          teams:[
            { team:'1', people:['Craig Smith','James Cosgrove'], actId:'svc-crossing', actName:'Road crossing 1500mm', unit:'m',
              qtyDone:20, groundCond:3, blocker:'None', firstPass:true, efficiency:100, adjEfficiency:100 },
            { team:'2', people:['Liam Smith'], actId:'svc-crossing', actName:'Road crossing 1500mm', unit:'m',
              qtyDone:2, groundCond:3, blocker:'Subcontractor delay', firstPass:true, efficiency:10, adjEfficiency:10 },
            { team:'3', people:[], actId:'kerb-bullnose', actName:'Bullnose kerb straight', unit:'m',
              qtyDone:0, groundCond:3, blocker:'Material delay', firstPass:true, efficiency:0, adjEfficiency:0 }
          ]
        },
        {
          date:'2026-05-29', foreman:'James Cosgrove', sm:'James Cosgrove', weather:'Sunny',
          teams:[
            { team:'1', people:['Craig Smith','James Cosgrove'], actId:'d110-150', actName:'110mm drain — 1.5m deep', unit:'m',
              qtyDone:0, groundCond:3, blocker:'Third-party access', firstPass:true, efficiency:0, adjEfficiency:0 },
            { team:'2', people:['Liam Smith'], actId:'d110-150', actName:'110mm drain — 1.5m deep', unit:'m',
              qtyDone:4.5, groundCond:3, blocker:'None', firstPass:true, efficiency:25, adjEfficiency:25 },
            { team:'3', people:[], actId:'kerb-bullnose', actName:'Bullnose kerb straight', unit:'m',
              qtyDone:5, groundCond:3, blocker:'None', firstPass:true, efficiency:19, adjEfficiency:19 }
          ]
        }
      ];
      localStorage.setItem('dgc_gang_logs', JSON.stringify(seedLogs));
    } catch(e) {}
  })();

  // ── Gang log form for Daily Log tab (filled by James Cosgrove at end of day) ──
  window.buildGangLogForm = function() {
    var el = document.getElementById('gang-log-form-panel');
    if (!el) return;

    var GANG_STAFF = ['James Cosgrove','Craig Smith','Dean Garrett','Liam Smith',
                      'Lee Clinton','Jake Whetnall','Stephen Lamb','James Shannon',
                      'Stephen Smithies','Daniel Seed','Lewis Peck','Bradley McKevitt'];
    var GANG_BLOCKERS = ['None','Plant breakdown','Material delay','Design/instruction wait',
                         'Weather','Ground condition','Subcontractor delay','Third-party access','Other'];

    function loadGangLogs2()    { try{var s=localStorage.getItem('dgc_gang_logs');return s?JSON.parse(s):[];}catch(e){return[];} }
    function saveGangLogs2(l)   { try{localStorage.setItem('dgc_gang_logs',JSON.stringify(l));}catch(e){} }

    var GANG_ACTS = [
      {id:'d110-150',name:'110mm drain — 1.5m deep',unit:'m',output:17.8},
      {id:'d110-175',name:'110mm drain — 1.75m deep',unit:'m',output:17.0},
      {id:'d150-125',name:'150mm drain — 1.25m deep',unit:'m',output:21.6},
      {id:'d150-150',name:'150mm drain — 1.5m deep',unit:'m',output:19.0},
      {id:'d150-175',name:'150mm drain — 1.75m deep',unit:'m',output:17.0},
      {id:'d225-175',name:'225mm drain — 1.75m deep',unit:'m',output:19.0},
      {id:'d225-200',name:'225mm drain — 2.0m deep',unit:'m',output:17.0},
      {id:'mh1200-175',name:'1200mm manhole — 1.75m deep',unit:'nr',output:0.5},
      {id:'mh1350-175',name:'1350mm manhole — 1.75m deep',unit:'nr',output:0.29},
      {id:'gully',name:'Road gully 450x900mm',unit:'nr',output:2.0},
      {id:'rl-dig',name:'Reduce level dig',unit:'m³',output:100},
      {id:'type1',name:'Type 1 fill',unit:'m³',output:61},
      {id:'kerb-bullnose',name:'Bullnose kerb',unit:'m',output:27},
      {id:'kerb-hb2',name:'HB2 kerb',unit:'m',output:33},
      {id:'svc-single',name:'Services trench 750mm',unit:'m',output:40},
      {id:'svc-crossing',name:'Road crossing 1500mm',unit:'m',output:20}
    ];

    var logs2 = loadGangLogs2();
    var yesterday2 = new Date(); yesterday2.setDate(yesterday2.getDate()-1);
    var ystrLog2 = logs2.find(function(l){ return l.date===yesterday2.toISOString().slice(0,10); });

    var numGangs = 3;

    var gangForms = '';
    for (var gi=1; gi<=numGangs; gi++) {
      var yG = ystrLog2 ? (ystrLog2.teams||[]).find(function(t){return t.team===''+gi;}) : null;
      var defPeople = yG && yG.people ? yG.people : [];
      var defActId  = yG ? yG.actId : '';

      var pOpts = GANG_STAFF.map(function(n){
        return '<option value="'+n+'"'+(defPeople.indexOf(n)>=0?' selected':'')+'>'+n+'</option>';
      }).join('');
      var aOpts = '<option value="">— Activity —</option>'
        + GANG_ACTS.map(function(r){return '<option value="'+r.id+'"'+(r.id===defActId?' selected':'')+'>'+r.name+'</option>';}).join('');
      var bOpts = GANG_BLOCKERS.map(function(b){return '<option>'+b+'</option>';}).join('');

      gangForms += '<div style="border:1px solid var(--border);border-left:3px solid #f59e0b;border-radius:10px;padding:12px;margin-bottom:10px;">'
        + '<div style="font-size:12px;font-weight:900;color:#f59e0b;margin-bottom:8px;">Gang '+gi+(yG?' <span style="font-size:10px;font-weight:400;color:var(--muted);">(from yesterday)</span>':'')+'</div>'
        + '<div style="display:grid;grid-template-columns:2fr 1fr;gap:8px;margin-bottom:8px;">'
        + '<div><div style="font-size:9px;font-weight:800;text-transform:uppercase;color:var(--muted);margin-bottom:3px;">Who\'s in this gang?</div>'
        + '<select id="glf-'+gi+'-people" multiple size="3" style="width:100%;border-radius:7px;border:1px solid var(--border);font-size:11px;background:var(--surface2);color:var(--text);padding:3px;">'+pOpts+'</select>'
        + '<div style="font-size:9px;color:var(--muted);margin-top:1px;">Ctrl/Cmd to select multiple</div></div>'
        + '<div><div style="font-size:9px;font-weight:800;text-transform:uppercase;color:var(--muted);margin-bottom:3px;">Activity</div>'
        + '<select id="glf-'+gi+'-act" style="width:100%;padding:5px;border-radius:7px;border:1px solid var(--border);font-size:11px;background:var(--surface2);color:var(--text);">'+aOpts+'</select>'
        + '<div style="font-size:9px;font-weight:800;text-transform:uppercase;color:var(--muted);margin-top:6px;margin-bottom:3px;">Qty done</div>'
        + '<input id="glf-'+gi+'-qty" type="number" min="0" step="0.5" placeholder="0" style="width:100%;padding:5px;border-radius:7px;border:1px solid var(--border);font-size:13px;font-weight:900;background:var(--surface2);color:var(--text);text-align:center;"></div>'
        + '</div>'
        + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">'
        + '<div><div style="font-size:9px;font-weight:800;text-transform:uppercase;color:var(--muted);margin-bottom:3px;">Ground (1-5)</div>'
        + '<div style="display:flex;gap:3px;">'
        + [1,2,3,4,5].map(function(n){return '<button onclick="glfGround('+gi+','+n+',this)" style="flex:1;padding:4px;border-radius:5px;border:1px solid var(--border);background:'+(n===3?'#f59e0b':'var(--surface2)')+';color:'+(n===3?'#1a1d27':'var(--muted)')+';font-size:11px;font-weight:700;cursor:pointer;" data-gi="'+gi+'" data-gn="'+n+'">'+n+'</button>';}).join('')
        + '</div><input type="hidden" id="glf-'+gi+'-ground" value="3"></div>'
        + '<div><div style="font-size:9px;font-weight:800;text-transform:uppercase;color:var(--muted);margin-bottom:3px;">Blocker</div>'
        + '<select id="glf-'+gi+'-block" style="width:100%;padding:5px;border-radius:7px;border:1px solid var(--border);font-size:11px;background:var(--surface2);color:var(--text);">'+bOpts+'</select></div>'
        + '</div>'
        + '</div>';
    }

    el.innerHTML = '<div style="border-top:2px solid var(--border);padding-top:16px;margin-top:16px;">'
      + '<div style="font-size:14px;font-weight:800;color:var(--text);margin-bottom:4px;">📋 End-of-day gang output log</div>'
      + '<div style="font-size:12px;color:var(--muted);margin-bottom:14px;">James Cosgrove fills this in at end of day. Under 60 seconds. Results feed the Director → Gang Intel analytics.</div>'
      + '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px;">'
      + '<div><div style="font-size:9px;font-weight:800;text-transform:uppercase;color:var(--muted);margin-bottom:3px;">Date</div><input id="glf-date" type="date" style="width:100%;padding:7px;border-radius:8px;border:1px solid var(--border);font-size:13px;background:var(--surface2);color:var(--text);"></div>'
      + '<div><div style="font-size:9px;font-weight:800;text-transform:uppercase;color:var(--muted);margin-bottom:3px;">Foreman</div><select id="glf-foreman" style="width:100%;padding:7px;border-radius:8px;border:1px solid var(--border);font-size:12px;background:var(--surface2);color:var(--text);"><option>James Cosgrove</option><option>David Smith</option><option>Harry Harrison</option></select></div>'
      + '<div><div style="font-size:9px;font-weight:800;text-transform:uppercase;color:var(--muted);margin-bottom:3px;">Weather</div><select id="glf-weather" style="width:100%;padding:7px;border-radius:8px;border:1px solid var(--border);font-size:12px;background:var(--surface2);color:var(--text);"><option>Sunny</option><option>Cloudy</option><option>Rain</option><option>Heavy Rain</option><option>Wind/Frost</option></select></div>'
      + '</div>'
      + gangForms
      + '<button onclick="glfSave('+numGangs+')" style="width:100%;padding:12px;background:#f59e0b;border:none;border-radius:10px;color:#1a1d27;font-size:14px;font-weight:900;cursor:pointer;margin-top:4px;">💾 Save gang log</button>'
      + '<div id="glf-confirm" style="margin-top:10px;font-size:12px;color:var(--muted);text-align:center;"></div>'
      + '</div>';

    var d = document.getElementById('glf-date');
    if(d) d.value = new Date().toISOString().slice(0,10);

    window.glfGround = function(gi, val, btn) {
      document.querySelectorAll('button[data-gi="'+gi+'"]').forEach(function(b) {
        b.style.background='var(--surface2)'; b.style.color='var(--muted)';
      });
      btn.style.background='#f59e0b'; btn.style.color='#1a1d27';
      var h=document.getElementById('glf-'+gi+'-ground'); if(h)h.value=val;
    };

    window.glfSave = function(n) {
      var date    = (document.getElementById('glf-date')   ||{}).value || new Date().toISOString().slice(0,10);
      var foreman = (document.getElementById('glf-foreman')||{}).value || '';
      var weather = (document.getElementById('glf-weather')||{}).value || '';
      var teams=[];
      for(var i=1;i<=n;i++) {
        var pSel = document.getElementById('glf-'+i+'-people');
        var people = pSel ? Array.from(pSel.selectedOptions).map(function(o){return o.value;}) : [];
        var actId  = (document.getElementById('glf-'+i+'-act')  ||{}).value;
        var qty    = parseFloat((document.getElementById('glf-'+i+'-qty')  ||{}).value);
        var ground = parseInt((document.getElementById('glf-'+i+'-ground')||{}).value)||3;
        var block  = (document.getElementById('glf-'+i+'-block')||{}).value||'None';
        var act    = GANG_ACTS.find(function(a){return a.id===actId;});
        var eff    = (act && !isNaN(qty)) ? Math.round(qty/act.output*100) : null;
        teams.push({ team:''+i, people:people, actId:actId, actName:act?act.name:'', unit:act?act.unit:'',
                     qtyDone:isNaN(qty)?null:qty, groundCond:ground, blocker:block, efficiency:eff });
      }
      var l2=loadGangLogs2();
      l2=l2.filter(function(x){return x.date!==date;});
      l2.unshift({date:date,foreman:foreman,sm:foreman,weather:weather,teams:teams});
      saveGangLogs2(l2);
      var c=document.getElementById('glf-confirm');
      if(c) c.innerHTML='✅ Saved for '+date+'. View analytics in Director → Gang Intel.';
    };
  };

})();

</script>
